syntax = "proto3";

package recipes.brave.toolchains.rust.package_rust;

message InputProperties {
  // Brave's monotonic sub-revision within a given Chromium ref, used to
  // distinguish repackages of the same Chromium tag.
  int32 brave_subrevision = 1;
  // Chromium ref (tag or branch) whose Rust toolchain is packaged.
  string chromium_ref = 2;
}

message EnvProperties {
  // Optional git cache directory to speed up the Chromium checkout.
  string GIT_CACHE = 1;
}
