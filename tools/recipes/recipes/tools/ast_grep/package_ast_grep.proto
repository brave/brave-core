syntax = "proto3";

package recipes.brave.tools.ast_grep.package_ast_grep;

message InputProperties {
  // Chromium ref (tag or branch) whose checkout the tool is packaged against.
  string chromium_ref = 1;
}

message EnvProperties {
  // Optional git cache directory to speed up the Chromium checkout.
  string GIT_CACHE = 1;
}
