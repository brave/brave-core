# Build and push the Claude PR review Docker image to ghcr.io (manual only).
# Run from Actions → "Build PR review image" → Run workflow.
# The PR review workflow (pr-review-claude.yml) pulls this image when present.
name: Build PR review image

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build the pr-review-claude docker image
    runs-on: ubuntu-latest
    steps:
      # Only paths referenced by the Dockerfile COPY (full clone is huge for brave-core).
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          sparse-checkout: |
            .github/workflows/pr-review-claude.dockerfile
            .github/workflows/pr-review-claude.py
            .claude/skills/review-prs/SKILL.md
          sparse-checkout-cone-mode: false

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Build and push
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          file: .github/workflows/pr-review-claude.dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/pr-review-claude:latest
            ghcr.io/${{ github.repository }}/pr-review-claude:${{ github.sha }}
