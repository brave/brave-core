name: Sync and rebase PR from fork

on:
  workflow_dispatch:
    inputs:
      PR_NUMBER:
        required: true
        description: "Number of the PR from the fork"
      COMMIT_HASH:
        required: false
        description: "Commit hash of the PR (required unless PR author is in TRUSTED_BOT_AUTHORS)"

permissions:
  contents: write
  pull-requests: write

jobs:
  sync-and-rebase-pr-from-fork:
    runs-on: ubuntu-slim
    steps:
      - name: Checkout repository
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          fetch-depth: 0

      - name: Setup Git
        run: |
          git config user.name brave-builds
          git config user.email devops@brave.com
          git config push.default simple

      - name: Sync and rebase PR from fork
        env:
          GITHUB_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          PR_NUMBER: ${{ inputs.PR_NUMBER }}
          COMMIT_HASH: ${{ inputs.COMMIT_HASH }}
          # Trusted bot accounts operated by Brave employees - commit hash is optional for these
          # as the race condition risk is mitigated by the operator controlling the bot
          TRUSTED_BOT_AUTHORS: "netzenbot"
        run: |
          set -xeEo pipefail
          shopt -s inherit_errexit

          gh_pr_view=$(gh pr view "$PR_NUMBER" --json baseRefName,headRefName,headRefOid,headRepository,headRepositoryOwner,id,isCrossRepository,url)

          JQ=(jq -e -r)

          # If commit hash not provided, fetch latest from PR (only allowed for trusted bots)
          if [[ -z "$COMMIT_HASH" ]]; then
            pr_author=$("${JQ[@]}" .headRepositoryOwner.login <<<"$gh_pr_view")
            
            # Check if PR author is in trusted bot authors list
            is_trusted_bot="$(case " $TRUSTED_BOT_AUTHORS " in *" $pr_author "*) echo true;; *) echo false;; esac)"

            if [[ "$is_trusted_bot" = true ]]; then
              echo "Trusted bot author '$pr_author' - fetching latest commit hash from PR"
              COMMIT_HASH=$("${JQ[@]}" .headRefOid <<<"$gh_pr_view")
              echo "Using commit hash: $COMMIT_HASH"
            else
              echo "::error::COMMIT_HASH is required for PRs from non-trusted authors." >&2
              echo "::error::PR author '$pr_author' is not in TRUSTED_BOT_AUTHORS list: $TRUSTED_BOT_AUTHORS" >&2
              exit 1
            fi
          fi

          # Validate commit hash format
          if ! grep -qix '[0-9a-f]\{40,40\}' <<<"$COMMIT_HASH"; then 
            echo "::error::Provide a full commit hash; got: $COMMIT_HASH" >&2
            exit 1
          fi

          baseRefName=$("${JQ[@]}" .baseRefName <<<"$gh_pr_view")
          headRefName=$("${JQ[@]}" .headRefName <<<"$gh_pr_view")
          headRepositoryName=$("${JQ[@]}" .headRepository.name <<<"$gh_pr_view")
          headRepositoryOwnerLogin=$("${JQ[@]}" .headRepositoryOwner.login <<<"$gh_pr_view")
          isCrossRepository=$("${JQ[@]}" .isCrossRepository <<<"$gh_pr_view")
          url=$("${JQ[@]}" .url <<<"$gh_pr_view")

          [[ "$isCrossRepository" = true ]] || { echo "::error::PR is not cross repo. Exiting!" >&2; exit 1; }

          git remote add contributor "https://github.com/$headRepositoryOwnerLogin/$headRepositoryName.git" || :
          contribHeadRefName="contributor-$headRepositoryOwnerLogin-$headRefName"
          git fetch --no-tags contributor +"$headRefName":"$contribHeadRefName"
          # Note we are checking out the provided commit hash instead of the pr-branch to avoid race condition
          # The author could have commited malicious code between the last review and the execution of this workflow
          git checkout "$COMMIT_HASH"
          
          # Rebase the branch with the latest targeting branch HEAD
          git fetch origin "$baseRefName"
          if ! git rebase FETCH_HEAD; then
            echo "Rebase conflict detected. Please resolve the conflicts and push the changes to your fork. Exiting!"
            exit 1
          fi
          git push -f origin HEAD:"refs/heads/$contribHeadRefName"

          existing_prs=$(gh pr list -H "$contribHeadRefName" --json number)
          if [[ "$existing_prs" = "[]" ]]; then
            gh pr create \
              --draft \
              --base "$baseRefName" \
              --head "$contribHeadRefName" \
              --title "CI run for contributor PR #$PR_NUMBER" \
              --body \
          "## Description
          This PR is created to run CI on the changes proposed in PR #$PR_NUMBER by @$headRepositoryOwnerLogin.

          **This PR should not be merged.**"
          fi
