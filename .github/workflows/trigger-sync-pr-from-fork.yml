name: Trigger sync PR from fork

on:
  pull_request_review:
    types: [submitted]

permissions:
  actions: write # Required to trigger other workflows

jobs:
  trigger-workflow:
    if: >-
      ${{ github.event.review.user.type != 'Bot'
      && contains(github.event.review.body, '/run-ci')
      && contains(fromJSON('["OWNER", "MEMBER"]'), github.event.review.author_association) }}
    runs-on: ubuntu-slim
    steps:
      - name: Dispatch Target with Strict Snapshot Data
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const commitHash = context.payload.review.commit_id;

            // Strict Validation: If GitHub payload has no locked commit hash, fail immediately
            if (!commitHash) {
              core.setFailed("CRITICAL ERROR: Unable to securely resolve the immutable review.commit_id snapshot. Terminating process to prevent race conditions.");
              return;
            }

            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'sync-pr-from-fork.yml',
              ref: 'main',
              inputs: {
                PR_NUMBER: String(prNumber),
                COMMIT_HASH: commitHash
              }
            });
