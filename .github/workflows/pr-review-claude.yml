# Run Claude-driven PR review in Docker.
# Posts review as a PR comment. Use a bot account token with
# pull request read + comment write.
#
# Opt-in: runs only when the PR has label "review/claude" (remove the
# "if" to enable for all PRs once cost is acceptable).
#
# Author must be MEMBER or OWNER of the repo org (github.event.pull_request.
# author_association). Fork PRs from non-members are CONTRIBUTOR / etc. To also
# allow trusted outside collaborators, add: || ... == 'COLLABORATOR'
name: PR review (Claude)

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: read
  pull-requests: write
  packages: write

jobs:
  review:
    name: Claude PR review
    runs-on: ubuntu-latest
    if: contains(github.event.pull_request.labels.*.name, 'review/claude') && (github.event.pull_request.author_association == 'MEMBER' || github.event.pull_request.author_association == 'OWNER')
    env:
      GH_TOKEN: ${{ secrets.PR_REVIEW_BOT_GITHUB_TOKEN }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull review image
        run: docker pull ghcr.io/${{ github.repository }}/pr-review-claude:latest

      - name: Run Claude PR review
        run: |
          docker run --rm \
            -e GH_TOKEN="${{ env.GH_TOKEN }}" \
            -e ANTHROPIC_API_KEY="${{ env.ANTHROPIC_API_KEY }}" \
            -v "$PWD:/workspace:ro" \
            ghcr.io/${{ github.repository }}/pr-review-claude:latest \
            /workspace/brave/.github/workflows/pr-review-claude.py \
            "${{ github.event.pull_request.number }}" "${{ github.repository }}"
