# Build and push the Claude PR review Docker image to ghcr.io.
# The PR review workflow (pr-review-claude.yml) pulls this image when present.
name: Build PR review image

on:
  push:
    branches: [master, main]
    paths:
      - 'brave/.github/docker/**'
      - 'brave/.claude/ci/**'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build and push image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./brave/.github/docker/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/pr-review-claude:latest
            ghcr.io/${{ github.repository }}/pr-review-claude:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
