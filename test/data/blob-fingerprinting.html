<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Blob fingerprinting test</title>
</head>
<body>
  <script>
    function readScreenValues() {
      return {
        width: screen.width,
        height: screen.height,
        availWidth: screen.availWidth,
        availHeight: screen.availHeight,
        availLeft: screen.availLeft,
        availTop: screen.availTop,
        screenX: screenX,
        screenY: screenY,
      };
    }

    // Writes the various screen attributes to the local storage.
    function writeScreenValues(prefix) {
      const values = readScreenValues();
      Object.keys(values).forEach((key) => {
        localStorage.setItem(`${prefix}_${key}`, String(values[key]));
      });
    }

    function readStoredScreenValues(prefix) {
      return {
        width: Number(localStorage.getItem(`${prefix}_width`)),
        height: Number(localStorage.getItem(`${prefix}_height`)),
        availWidth: Number(localStorage.getItem(`${prefix}_availWidth`)),
        availHeight: Number(localStorage.getItem(`${prefix}_availHeight`)),
        availLeft: Number(localStorage.getItem(`${prefix}_availLeft`)),
        availTop: Number(localStorage.getItem(`${prefix}_availTop`)),
        screenX: Number(localStorage.getItem(`${prefix}_screenX`)),
        screenY: Number(localStorage.getItem(`${prefix}_screenY`)),
      };
    }

    function storedScreenValuesMatch(leftPrefix, rightPrefix) {
      const left = readStoredScreenValues(leftPrefix);
      const right = readStoredScreenValues(rightPrefix);
      return Object.keys(left).every((key) => left[key] === right[key]);
    }

    // Opens a pop-up window with a blob:// url which writes to the local
    // storage the various screen attributes it sees. The popup sets its own
    // title to "pass" or "fail".
    window.startBlobScreenFingerprintingTest = function() {
      document.title = 'Blob fingerprinting test';
      localStorage.clear();
      writeScreenValues('parent');
      const html =
`<!DOCTYPE html>
    <html>
    <head><meta charset="utf-8"></head>
    <body>
    <script>
        const readScreenValues = ${readScreenValues.toString()};
        const writeScreenValues = ${writeScreenValues.toString()};
        const readStoredScreenValues = ${readStoredScreenValues.toString()};
        const storedScreenValuesMatch = ${storedScreenValuesMatch.toString()};
        writeScreenValues('blob');
        document.title = storedScreenValuesMatch('parent', 'blob')
            ? 'pass'
            : 'fail';
    <\/script>
    </body>
</html>`;

      const blob = new Blob([html], {type: 'text/html'});
      window.open(
          URL.createObjectURL(blob), '_blank',
          `left=${screenX},top=${screenY},width=${outerWidth},height=${outerHeight}`);
    };

    // Loads a blob:// url in an iframe which writes to the local storage the
    // various screen attributes it sees. The main frame polls localStorage for
    // completion and sets its own title to "pass", "fail", or "timeout".
    window.startBlobScreenFingerprintingIframeTest = function() {
      document.title = 'Blob fingerprinting test';
      localStorage.clear();
      writeScreenValues('parent');
      const html =
`<!DOCTYPE html>
    <html>
    <head><meta charset="utf-8"></head>
    <body>
    <script>
        const readScreenValues = ${readScreenValues.toString()};
        const writeScreenValues = ${writeScreenValues.toString()};
        writeScreenValues('blob');
        localStorage.setItem('blob_done', 'true');
    <\/script>
    </body>
</html>`;

      const blob = new Blob([html], {type: 'text/html'});
      const blobUrl = URL.createObjectURL(blob);

      const iframe = document.createElement('iframe');
      iframe.src = blobUrl;
      document.body.appendChild(iframe);

      let attempts = 0;
      const poller = setInterval(() => {
        attempts++;
        if (attempts > 200) {
          clearInterval(poller);
          URL.revokeObjectURL(blobUrl);
          document.title = 'timeout';
          return;
        }

        if (localStorage.getItem('blob_done') !== 'true') return;

        clearInterval(poller);
        URL.revokeObjectURL(blobUrl);
        document.title = storedScreenValuesMatch('parent', 'blob')
            ? 'pass'
            : 'fail';
      }, 50);
    };
  </script>
</body>
</html>
