<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>PaymentRequest language leak regression test for https://github.com/brave/brave-browser/issues/56266</title>
</head>
<body>
  <script>
    async function doPaymentRequest() {
      const methodUrl = window.location.origin + '/payment-method-test';
      const r = new PaymentRequest([{supportedMethods: methodUrl}], {
        total: {label: 'total', amount: {value: '0', currency: 'USD'}}
      });
      try {
        await r.show();
      } catch (e) {}
    }
  </script>
</body>
</html>
