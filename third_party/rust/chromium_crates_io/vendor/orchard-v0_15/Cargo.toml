[package]
edition = "2021"
rust-version = "1.85.1"
name = "orchard"
version = "0.15.0-pre.2"
authors = [
    "Sean Bowe <ewillbefull@gmail.com>",
    "Jack Grigg <thestr4d@gmail.com>",
    "Daira-Emma Hopwood <daira@jacaranda.org>",
    "Ying Tong Lai",
    "Kris Nuttycombe <kris@nutty.land>",
]
build = false
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = "The Orchard shielded transaction protocol"
documentation = "https://docs.rs/orchard"
readme = "README.md"
keywords = ["zcash"]
categories = ["cryptography::cryptocurrencies"]
license = "MIT OR Apache-2.0"
repository = "https://github.com/zcash/orchard"

[package.metadata.docs.rs]
all-features = true
rustdoc-args = [
    "--cfg",
    "docsrs",
    "--html-in-header",
    "katex-header.html",
]

[features]
circuit = [
    "dep:halo2_gadgets",
    "dep:halo2_proofs",
    "std",
]
default = [
    "circuit",
    "multicore",
    "std",
]
dev-graph = [
    "halo2_proofs?/dev-graph",
    "image",
    "plotters",
]
multicore = ["halo2_proofs?/multicore"]
std = [
    "corez/std",
    "group/wnaf-memuse",
    "reddsa/std",
]
test-dependencies = [
    "proptest",
    "rand/std",
]
unstable-frost = []
unstable-voting-circuits = []

[lib]
name = "orchard"
path = "src/lib.rs"
bench = false

[[test]]
name = "builder"
path = "tests/builder.rs"

[[bench]]
name = "circuit"
path = "benches/circuit.rs"
harness = false
required-features = ["circuit"]

[[bench]]
name = "note_decryption"
path = "benches/note_decryption.rs"
harness = false
required-features = ["circuit"]

[[bench]]
name = "small"
path = "benches/small.rs"
harness = false

