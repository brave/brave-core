# Cargo configuration for the BoringTun vendored build.
#
# CARGO_HOME and CARGO_TARGET_DIR are set by build_boringtun.py to isolated,
# Brave-specific locations -- this build never reads or writes Chromium's
# shared Rust caches.

# -----------------------------------------------------------------------------
# Per-target rustflags
# -----------------------------------------------------------------------------
# Disable AVX and wider SIMD to ensure compatibility with the widest
# possible range of hardware. "x86-64" is the baseline x86_64 feature set
# (SSE2 only). For ARM, "generic" avoids any microarch-specific tuning.

[target.i686-pc-windows-msvc]
rustflags = ["-C", "target-feature=+crt-static", "-C", "target-cpu=pentium4", "-C", "target-feature=-avx,-avx2,-avx512f"]

[target.x86_64-pc-windows-msvc]
rustflags = ["-C", "target-feature=+crt-static", "-C", "target-cpu=x86-64", "-C", "target-feature=-avx,-avx2,-avx512f"]
 
[target.aarch64-pc-windows-msvc]
rustflags = ["-C", "target-feature=+crt-static", "-C", "target-cpu=generic"]

[target.x86_64-unknown-linux-gnu]
rustflags = ["-C", "target-cpu=x86-64", "-C", "target-feature=-avx,-avx2,-avx512f"]

[target.aarch64-unknown-linux-gnu]
rustflags = ["-C", "target-cpu=generic"]

[target.x86_64-apple-darwin]
rustflags = ["-C", "target-cpu=x86-64", "-C", "target-feature=-avx,-avx2,-avx512f", "-C", "link-arg=-Wl,-undefined,error"]

[target.aarch64-apple-darwin]
rustflags = ["-C", "target-cpu=apple-m1", "-C", "link-arg=-Wl,-undefined,error"]

[source.crates-io]
replace-with = "vendored-sources"

[source."git+https://github.com/cloudflare/boringtun.git?rev=cdf3b24558441ff4dc62bf5992484c5457a36760"]
git = "https://github.com/cloudflare/boringtun.git"
rev = "cdf3b24558441ff4dc62bf5992484c5457a36760"
replace-with = "vendored-sources"

[source.vendored-sources]
directory = "vendor/"
