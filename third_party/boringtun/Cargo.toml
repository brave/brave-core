#
# This crate exists ONLY to pin BoringTun as a git dependency at a specific
# commit. We never build this crate ourselves -- the actual cdylib shipped
# to consumers is `boringtun` itself.

[package]
name = "boringtun_pin"
version = "0.0.0"
edition = "2021"
publish = false
license = "MPL-2.0"
description = "Internal pin of cloudflare/boringtun for Brave's vendored cdylib build."

[lib]
path = "src/lib.rs"
crate-type = ["rlib"]

[dependencies]
boringtun = { git = "https://github.com/cloudflare/boringtun.git", rev = "cdf3b24558441ff4dc62bf5992484c5457a36760", default-features = false, features = ["ffi-bindings"] }
