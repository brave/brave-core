[package]
edition = "2018"
name = "boringtun"
version = "0.7.0"
authors = [
    "Noah Kennedy <nkennedy@cloudflare.com>",
    "Andy Grover <agrover@cloudflare.com>",
    "Jeff Hiner <jhiner@cloudflare.com>",
]
build = false
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = "an implementation of the WireGuard® protocol designed for portability and speed"
documentation = "https://docs.rs/boringtun/0.7.0/boringtun/"
readme = "../README.md"
license = "BSD-3-Clause"
repository = "https://github.com/cloudflare/boringtun"

[features]
default = []
device = [
    "socket2",
    "thiserror",
]
ffi-bindings = ["tracing-subscriber"]
jni-bindings = [
    "ffi-bindings",
    "jni",
]
mock-instant = ["mock_instant"]

[lib]
name = "boringtun"
crate-type = [
    "staticlib",
    "cdylib",
    "rlib",
]
path = "src/lib.rs"

[[bench]]
name = "crypto_benches"
path = "benches/crypto_benches/main.rs"
harness = false

[dependencies]
aead = "0.5.0-pre.2"
base64 = "0.13"
blake2 = "0.10"
chacha20poly1305 = "0.10.0-pre.1"
hex = "0.4"
hmac = "0.12"
ip_network = "0.4.1"
ip_network_table = "0.2.0"
libc = "0.2"
parking_lot = "0.12"
ring = "0.17"
tracing = "0.1.40"
untrusted = "0.9.0"

[dependencies.jni]
version = "0.19.0"
optional = true

[dependencies.mock_instant]
version = "0.3"
optional = true

[dependencies.rand_core]
version = "0.6.4"
features = ["getrandom"]

[dependencies.socket2]
version = "0.4.7"
features = ["all"]
optional = true

[dependencies.thiserror]
version = "1"
optional = true

[dependencies.tracing-subscriber]
version = "0.3"
features = ["fmt"]
optional = true

[dependencies.x25519-dalek]
version = "2.0.1"
features = [
    "reusable_secrets",
    "static_secrets",
]

[dev-dependencies]
etherparse = "0.13"
tracing-subscriber = "0.3"

[dev-dependencies.criterion]
version = "0.3.5"
features = ["html_reports"]

[target."cfg(unix)".dependencies.nix]
version = "0.25"
features = [
    "time",
    "user",
]
default-features = false
