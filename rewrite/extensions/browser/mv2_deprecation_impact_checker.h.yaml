substitutions:
  - description: |-
      Adjusts IsExtensionAffected signature to pass an additional parameter -
      extension id - so that the extension can be checked against Brave-hosted
      list.
    re_pattern: '(IsExtensionAffected\()(int manifest_version,)'
    replace: |-
      \1const ExtensionId& extension_id,
                                 \2
