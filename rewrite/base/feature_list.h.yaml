substitutions:
  - description: |-
      Declare Brave's FeatureList override hooks.

      The *_ChromiumImpl fallbacks and GetCompileTimeFeatureState() used by the
      base/feature_list.cc override, declared public for external callers.
    regex:
      pattern: '~FeatureList();'
      replace: |-
        ~FeatureList();

          bool IsFeatureOverridden_ChromiumImpl(std::string_view feature_name) const;
          static std::optional<bool> GetStateIfOverridden_ChromiumImpl(
              const Feature& feature);
          static FeatureState GetCompileTimeFeatureState(const Feature& feature);
