substitutions:
  - description: |-
      Instantiate Brave's context menu coordinator, which hides the tab group
      creation entries when the "Enable tab groups" master switch is off.
    re_pattern: |-
      new (TabGridContextMenuCoordinator\()
    replace: |-
      new Brave\1
