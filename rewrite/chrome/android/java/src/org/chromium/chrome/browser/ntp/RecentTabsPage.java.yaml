substitutions:
  - description: |-
      Use Brave's context menu manager, which hides "Open in new tab in group"
      on the Recent tabs page when the "Enable tab groups" master switch is off.
    regex:
      re_pattern: |-
        new (ContextMenuManager\()
      replace: |-
        new org.chromium.chrome.browser.native_page.Brave\1
