[[substitution]]
description = 'Use BraveMainPreferencesBase search index provider instead of MainSettings'
pattern = 'org.chromium.chrome.browser.settings.MainSettings.SEARCH_INDEX_DATA_PROVIDER'
replace = 'org.chromium.chrome.browser.settings.BraveMainPreferencesBase.SEARCH_INDEX_DATA_PROVIDER'

[[substitution]]
description = 'Remove AppearanceSettingsFragment provider (Brave uses AppearancePreferences instead)'
re_pattern = '\n\s+org\.chromium\.chrome\.browser\.appearance\.settings\.AppearanceSettingsFragment\n\s+\.SEARCH_INDEX_DATA_PROVIDER,'
replace = ''

[[substitution]]
description = 'Remove LanguageSettings provider (Brave uses BraveLanguageSettings instead)'
re_pattern = '\n\s+org\.chromium\.chrome\.browser\.language\.settings\.LanguageSettings\n\s+\.SEARCH_INDEX_DATA_PROVIDER,'
replace = ''

[[substitution]]
description = 'Remove PrivacySettings provider (Brave uses BravePrivacySettings instead)'
re_pattern = '\n\s+org\.chromium\.chrome\.browser\.privacy\.settings\.PrivacySettings\n\s+\.SEARCH_INDEX_DATA_PROVIDER,'
replace = ''

[[substitution]]
description = 'Append Brave settings search index providers at the end of ALL_PROVIDERS'
re_pattern = '(public static final List<SearchIndexProvider> ALL_PROVIDERS =\s+List\.of\([\s\S]*\.SEARCH_INDEX_DATA_PROVIDER)\);'
replace = '''\1,
                    org.chromium.components.browser_ui.site_settings.BraveSiteSettingsPreferencesBase
                            .SEARCH_INDEX_DATA_PROVIDER,
                    org.chromium.chrome.browser.password_manager.settings.PasswordSettings
                            .SEARCH_INDEX_DATA_PROVIDER,
                    org.chromium.chrome.browser.playlist.settings.BravePlaylistPreferences
                            .SEARCH_INDEX_DATA_PROVIDER,
                    org.chromium.chrome.browser.privacy.settings.BravePrivacySettings
                            .SEARCH_INDEX_DATA_PROVIDER,
                    org.chromium.chrome.browser.settings.BraveLeoDefaultModelPreferences
                            .SEARCH_INDEX_DATA_PROVIDER,
                    org.chromium.chrome.browser.settings.BraveLeoPreferences
                            .SEARCH_INDEX_DATA_PROVIDER,
                    org.chromium.chrome.browser.settings.BraveLicensePreferences
                            .SEARCH_INDEX_DATA_PROVIDER,
                    org.chromium.chrome.browser.settings.BraveOriginPreferences
                            .SEARCH_INDEX_DATA_PROVIDER,
                    org.chromium.chrome.browser.settings.BraveSearchEnginesPreferences
                            .SEARCH_INDEX_DATA_PROVIDER,
                    org.chromium.chrome.browser.settings.BraveSyncScreensPreference
                            .SEARCH_INDEX_DATA_PROVIDER,
                    org.chromium.chrome.browser.settings.BraveWalletNetworksPreferenceFragment
                            .SEARCH_INDEX_DATA_PROVIDER,
                    org.chromium.chrome.browser.settings.BraveWalletPreferences
                            .SEARCH_INDEX_DATA_PROVIDER,
                    org.chromium.chrome.browser.settings.BraveWebrtcPolicyPreferencesFragment
                            .SEARCH_INDEX_DATA_PROVIDER,
                    org.chromium.chrome.browser.settings.developer.BraveQAPreferences
                            .SEARCH_INDEX_DATA_PROVIDER,
                    org.chromium.chrome.browser.site_settings.BraveWalletEthereumConnectedSites
                            .SEARCH_INDEX_DATA_PROVIDER,
                    org.chromium.chrome.browser.site_settings.BraveWalletSolanaConnectedSites
                            .SEARCH_INDEX_DATA_PROVIDER,
                    org.chromium.chrome.browser.vpn.settings.BraveVpnPreferences
                            .SEARCH_INDEX_DATA_PROVIDER,
                    org.chromium.brave.browser.customize_menu.settings.BraveCustomizeMenuPreferenceFragment
                            .SEARCH_INDEX_DATA_PROVIDER,
                    org.chromium.chrome.browser.password_entry_edit.BlockedCredentialFragmentView
                            .SEARCH_INDEX_DATA_PROVIDER,
                    org.chromium.chrome.browser.password_entry_edit.CredentialEditFragmentView
                            .SEARCH_INDEX_DATA_PROVIDER,
                    org.chromium.chrome.browser.password_entry_edit.FederatedCredentialFragmentView
                            .SEARCH_INDEX_DATA_PROVIDER,
                    org.chromium.brave.browser.quick_search_engines.settings.QuickSearchEnginesFragment
                            .SEARCH_INDEX_DATA_PROVIDER,
                    org.chromium.brave.browser.custom_search_engines.settings.AddCustomSearchEnginePreferenceFragment
                            .SEARCH_INDEX_DATA_PROVIDER,
                    org.chromium.chrome.browser.settings.AppearancePreferences
                            .SEARCH_INDEX_DATA_PROVIDER,
                    org.chromium.chrome.browser.language.settings.BraveLanguageSettings
                            .SEARCH_INDEX_DATA_PROVIDER);'''
