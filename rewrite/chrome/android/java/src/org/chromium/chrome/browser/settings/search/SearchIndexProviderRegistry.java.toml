[[substitution]]
description = 'Replace MainSettings import with BraveMainPreferencesBase'
re_pattern = 'import org\.chromium\.chrome\.browser\.settings\.MainSettings;'
replace = 'import org.chromium.chrome.browser.settings.BraveMainPreferencesBase;'

[[substitution]]
description = 'Use BraveMainPreferencesBase search index provider instead of MainSettings'
pattern = 'MainSettings.SEARCH_INDEX_DATA_PROVIDER'
replace = 'BraveMainPreferencesBase.SEARCH_INDEX_DATA_PROVIDER'

[[substitution]]
description = 'Remove AppearanceSettingsFragment import (Brave uses AppearancePreferences instead)'
re_pattern = 'import org\.chromium\.chrome\.browser\.appearance\.settings\.AppearanceSettingsFragment;\n'
replace = ''

[[substitution]]
description = 'Remove AppearanceSettingsFragment provider (Brave uses AppearancePreferences instead)'
re_pattern = '\n\s+AppearanceSettingsFragment\.SEARCH_INDEX_DATA_PROVIDER,'
replace = ''

[[substitution]]
description = 'Remove LanguageSettings import (Brave uses BraveLanguageSettings instead)'
re_pattern = 'import org\.chromium\.chrome\.browser\.language\.settings\.LanguageSettings;\n'
replace = ''

[[substitution]]
description = 'Remove LanguageSettings provider (Brave uses BraveLanguageSettings instead)'
re_pattern = '\n\s+LanguageSettings\.SEARCH_INDEX_DATA_PROVIDER,'
replace = ''

[[substitution]]
description = 'Remove PrivacySettings import (Brave uses BravePrivacySettings instead)'
re_pattern = 'import org\.chromium\.chrome\.browser\.privacy\.settings\.PrivacySettings;\n'
replace = ''

[[substitution]]
description = 'Remove PrivacySettings provider (Brave uses BravePrivacySettings instead)'
re_pattern = '\n\s+PrivacySettings\.SEARCH_INDEX_DATA_PROVIDER,'
replace = ''

[[substitution]]
description = '''Add Brave settings search index provider imports

Pig-backing on the removal of `PageInfoCookiesSettings`.
'''
re_pattern = '(import org\.chromium\.components\.page_info\.PageInfoCookiesSettings;)'
replace = '''\1
import org.chromium.brave.browser.custom_search_engines.settings.AddCustomSearchEnginePreferenceFragment;
import org.chromium.brave.browser.customize_menu.settings.BraveCustomizeMenuPreferenceFragment;
import org.chromium.brave.browser.quick_search_engines.settings.QuickSearchEnginesFragment;
import org.chromium.chrome.browser.language.settings.BraveLanguageSettings;
import org.chromium.chrome.browser.password_entry_edit.BlockedCredentialFragmentView;
import org.chromium.chrome.browser.password_entry_edit.CredentialEditFragmentView;
import org.chromium.chrome.browser.password_entry_edit.FederatedCredentialFragmentView;
import org.chromium.chrome.browser.password_manager.settings.PasswordSettings;
import org.chromium.chrome.browser.playlist.settings.BravePlaylistPreferences;
import org.chromium.chrome.browser.privacy.settings.BravePrivacySettings;
import org.chromium.chrome.browser.settings.AppearancePreferences;
import org.chromium.chrome.browser.settings.BraveLeoDefaultModelPreferences;
import org.chromium.chrome.browser.settings.BraveLeoPreferences;
import org.chromium.chrome.browser.settings.BraveLicensePreferences;
import org.chromium.chrome.browser.settings.BraveOriginPreferences;
import org.chromium.chrome.browser.settings.BraveSearchEnginesPreferences;
import org.chromium.chrome.browser.settings.BraveSyncScreensPreference;
import org.chromium.chrome.browser.settings.BraveWalletNetworksPreferenceFragment;
import org.chromium.chrome.browser.settings.BraveWalletPreferences;
import org.chromium.chrome.browser.settings.BraveWebrtcPolicyPreferencesFragment;
import org.chromium.chrome.browser.settings.developer.BraveQAPreferences;
import org.chromium.chrome.browser.site_settings.BraveWalletEthereumConnectedSites;
import org.chromium.chrome.browser.site_settings.BraveWalletSolanaConnectedSites;
import org.chromium.chrome.browser.vpn.settings.BraveVpnPreferences;
import org.chromium.components.browser_ui.site_settings.BraveSiteSettingsPreferencesBase;'''

[[substitution]]
description = 'Append Brave settings search index providers at the end of ALL_PROVIDERS'
re_pattern = '(public static final List<SearchIndexProvider> ALL_PROVIDERS =\s+List\.of\([\s\S]*\.SEARCH_INDEX_DATA_PROVIDER)\);'
replace = '''\1,
                    BraveSiteSettingsPreferencesBase.SEARCH_INDEX_DATA_PROVIDER,
                    PasswordSettings.SEARCH_INDEX_DATA_PROVIDER,
                    BravePlaylistPreferences.SEARCH_INDEX_DATA_PROVIDER,
                    BravePrivacySettings.SEARCH_INDEX_DATA_PROVIDER,
                    BraveLeoDefaultModelPreferences.SEARCH_INDEX_DATA_PROVIDER,
                    BraveLeoPreferences.SEARCH_INDEX_DATA_PROVIDER,
                    BraveLicensePreferences.SEARCH_INDEX_DATA_PROVIDER,
                    BraveOriginPreferences.SEARCH_INDEX_DATA_PROVIDER,
                    BraveSearchEnginesPreferences.SEARCH_INDEX_DATA_PROVIDER,
                    BraveSyncScreensPreference.SEARCH_INDEX_DATA_PROVIDER,
                    BraveWalletNetworksPreferenceFragment.SEARCH_INDEX_DATA_PROVIDER,
                    BraveWalletPreferences.SEARCH_INDEX_DATA_PROVIDER,
                    BraveWebrtcPolicyPreferencesFragment.SEARCH_INDEX_DATA_PROVIDER,
                    BraveQAPreferences.SEARCH_INDEX_DATA_PROVIDER,
                    BraveWalletEthereumConnectedSites.SEARCH_INDEX_DATA_PROVIDER,
                    BraveWalletSolanaConnectedSites.SEARCH_INDEX_DATA_PROVIDER,
                    BraveVpnPreferences.SEARCH_INDEX_DATA_PROVIDER,
                    BraveCustomizeMenuPreferenceFragment.SEARCH_INDEX_DATA_PROVIDER,
                    BlockedCredentialFragmentView.SEARCH_INDEX_DATA_PROVIDER,
                    CredentialEditFragmentView.SEARCH_INDEX_DATA_PROVIDER,
                    FederatedCredentialFragmentView.SEARCH_INDEX_DATA_PROVIDER,
                    QuickSearchEnginesFragment.SEARCH_INDEX_DATA_PROVIDER,
                    AddCustomSearchEnginePreferenceFragment.SEARCH_INDEX_DATA_PROVIDER,
