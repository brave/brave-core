substitutions:
  - description: |-
      Make the constructor overridable so BraveTabContextMenuCoordinator can
      subclass this strip context menu coordinator.
    re_pattern: |-
      private (TabContextMenuCoordinator\()
    replace: |-
      protected \1

  - description: |-
      Instantiate Brave's strip context menu coordinator, which hides the tab
      group creation entries when the "Enable tab groups" master switch is off.
    re_pattern: |-
      new (TabContextMenuCoordinator\()
    replace: |-
      new Brave\1
