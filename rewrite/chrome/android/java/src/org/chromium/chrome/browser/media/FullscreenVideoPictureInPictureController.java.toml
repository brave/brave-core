[[substitution]]
description = 'Import BraveActivity and the YouTube PiP helper'
re_pattern = '''(import org\.chromium\.chrome\.browser\.ActivityTabProvider;\n)'''
replace = '''\1import org.chromium.chrome.browser.app.BraveActivity;
'''
count = 1

[[substitution]]
description = 'Import the Brave YouTube PiP helper'
pattern = 'import org.chromium.chrome.browser.tab.Tab;'
replace = '''import org.chromium.chrome.browser.tab.Tab;
import org.chromium.chrome.browser.youtube_script_injector.BraveYouTubeScriptInjectorNativeHelper;'''
count = 1

[[substitution]]
description = 'Mark Brave-managed YouTube PiP sessions before manual fullscreen-video PiP entry'
re_pattern = '''(\s+if \(!allowed\) return;\n\n\s+final WebContents webContents = getWebContents\(\);\n\s+assert webContents != null;\n)'''
replace = '''\1        final BraveActivity braveActivity =
                getBraveActivityForYouTubePictureInPicture(webContents);
        if (braveActivity != null) {
            braveActivity.onYouTubePictureInPictureRequested(webContents);
        }
'''
count = 1

[[substitution]]
description = 'Clear Brave-managed YouTube PiP session state when manual PiP entry returns false'
re_pattern = '''if \(!mActivity\.enterPictureInPictureMode\(builder\.build\(\)\)\) return;'''
replace = '''if (!mActivity.enterPictureInPictureMode(builder.build())) {
                if (braveActivity != null) {
                    braveActivity.onYouTubePictureInPictureEnterFailed();
                }
                return;
            }'''
count = 1

[[substitution]]
description = 'Clear Brave-managed YouTube PiP session state when manual PiP entry throws'
re_pattern = '''(\s+Log\.e\(TAG, "Error entering PiP with bounds %s", bounds, e\);\n)'''
replace = '''\1            if (braveActivity != null) {
                braveActivity.onYouTubePictureInPictureEnterFailed();
            }
'''
count = 1

[[substitution]]
description = 'Add a helper to detect Brave-managed YouTube PiP candidates for manual fullscreen-video PiP'
re_pattern = '''(    private boolean canStartPipBasedOnRecentTasks\(\) \{\n\s+return AndroidTaskUtils\.getRecentAppTasksMatchingComponentNames\(\n\s+mActivity, NO_PIP_COMPONENT_NAMES\)\n\s+\.isEmpty\(\);\n\s+\}\n\n)(    /\*\*)'''
replace = '''\1    private @Nullable BraveActivity getBraveActivityForYouTubePictureInPicture(
            WebContents webContents) {
        if (!(mActivity instanceof BraveActivity braveActivity)
                || !BraveYouTubeScriptInjectorNativeHelper.isPictureInPictureAvailable(
                        webContents)) {
            return null;
        }

        return braveActivity;
    }
\2'''
count = 1
