[[substitution]]
description = """
Always make chrome:// schemes install rather than creating a shortcut (shortcuts can't handle chrome: urls).
"""
re_pattern = '(doUniversalInstall(\s|.)+?)(controller == null)'
re_flags = ["MULTILINE"]
replace = '\1\3 || currentTab.getUrl().getScheme().equals("chrome")'
