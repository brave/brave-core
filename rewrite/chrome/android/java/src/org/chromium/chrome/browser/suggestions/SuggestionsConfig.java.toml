# We want to see 11 most visited tiles on NTP as it was on cr147 and before
[[substitution]]
description = 'Expand MAX_TILE_COUNT to 11 which was pre cr146'
re_pattern = '(MAX_TILE_COUNT\s+=\s+)8'
replace = '\g<1>11'
