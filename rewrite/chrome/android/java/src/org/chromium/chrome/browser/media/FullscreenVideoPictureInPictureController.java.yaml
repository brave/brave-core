substitutions:
  - description: |-
      Delegate YouTube PiP entry to Brave.

      Replaces the inline enterPictureInPictureMode() try/catch with a single call
      to BraveFullscreenVideoPictureInPictureController#braveAttemptPictureInPicture(),
      which performs the entry, notifies Brave of the attempt, and rolls the
      session state back if entry is refused or throws. Keeping all of that in the
      Brave superclass means upstream just hands off the built params. The pattern
      is anchored inside attemptPictureInPicture() and matches the try/catch by
      balanced braces (tolerating up to two levels of nested {} in either body,
      independent of line breaks or indentation), with a content-agnostic
      catch(...), so it stays scoped to this method and does not depend on the
      refusal check, the caught exception types, or the log statement inside.
    re_pattern:
      '(public void attemptPictureInPicture\(\)
      \{[\s\S]*?)\btry\s*\{(?:[^{}]|\{(?:[^{}]|\{[^{}]*\})*\})*\}\s*catch\s*\([^)]*\)\s*\{(?:[^{}]|\{(?:[^{}]|\{[^{}]*\})*\})*\}'
    replace: |-
      \1BraveFullscreenVideoPictureInPictureController.class.cast(this)
                      .braveAttemptPictureInPicture(mActivity, webContents, builder, bounds);

  - description: |-
      Let Brave intercept YouTube PiP dismiss signals.

      At the top of dismissActivityIfNeeded(), gives Brave a chance to handle the
      dismiss via maybeHandleDismissActivityForYouTubePictureInPicture(),
      translating the upstream MetricsEndReason enum into individual boolean
      flags so Brave does not depend on the enum directly. Returns early when
      Brave handles it.
    re_pattern: '(\s+private void dismissActivityIfNeeded\(.*\) \{)'
    replace: |-
      \1
              if (BraveFullscreenVideoPictureInPictureController.class.cast(this)
                      .maybeHandleDismissActivityForYouTubePictureInPicture(
                              activity,
                              reason == MetricsEndReason.START,
                              reason == MetricsEndReason.RESUME,
                              reason == MetricsEndReason.LEFT_FULLSCREEN,
                              reason == MetricsEndReason.WEB_CONTENTS_LEFT_FULLSCREEN,
                              reason == MetricsEndReason.NEW_TAB)) {
                  return;
              }
