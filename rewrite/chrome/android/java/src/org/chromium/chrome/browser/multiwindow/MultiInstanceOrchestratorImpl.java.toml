[[substitution]]
description = "Remove final to allow BraveMultiInstanceOrchestratorImpl to extend it."
pattern = '/* package */ final class MultiInstanceOrchestratorImpl'
replace = '/* package */ class MultiInstanceOrchestratorImpl'

[[substitution]]
description = "Make constructor package-private to allow BraveMultiInstanceOrchestratorImpl to call super()."
pattern = 'private MultiInstanceOrchestratorImpl(TabReparentingDelegate tabReparentingDelegate)'
replace = 'MultiInstanceOrchestratorImpl(TabReparentingDelegate tabReparentingDelegate)'
