substitutions:
  - description:
      Preserve fullscreen state while Brave-managed YouTube PiP is active when a
      tab is hidden
    re_pattern:
      '(public void onHidden\(Tab tab, @TabHidingType int
      reason\)\s+\{\n)([\s\S]*?\n)
      +mFullscreenManagerDelegate\.onExitFullscreen\(null\);'
    replace: |-
      \1                        if (BraveFullscreenHtmlApiHandlerBase.class.cast(
                                              FullscreenHtmlApiHandlerBase.this)
                                      .maybeSkipExitFullscreenOnTabHidden(mActivity, reason)) {
                                  return;
                              }
      \2                        mFullscreenManagerDelegate.onExitFullscreen(null);

  - description:
      Add a PiP-specific persistent fullscreen exit entry point,
      exitPersistentFullscreenModeForPictureInPicture, that tears down the
      browser fullscreen UI while preserving the WebContents (DOM) fullscreen
      state. It sets mSkipWebContentsExitFullscreenForPip on the Brave
      superclass for the duration of a single synchronous
      exitPersistentFullscreenMode() call and clears it in a finally block so
      the flag never leaks beyond that call.
    re_pattern:
      '(@Override\n\s+public void exitPersistentFullscreenMode\(\)\s+\{\n)'
    replace: |-
      public void exitPersistentFullscreenModeForPictureInPicture() {
              BraveFullscreenHtmlApiHandlerBase self = BraveFullscreenHtmlApiHandlerBase.class.cast(this);
              self.mSkipWebContentsExitFullscreenForPip = true;
              try {
                  exitPersistentFullscreenMode();
              } finally {
                  self.mSkipWebContentsExitFullscreenForPip = false;
              }
          }

          \1

  - description:
      Skip the WebContents (DOM) fullscreen exit for the Brave-managed PiP path,
      gated on the flag set by exitPersistentFullscreenModeForPictureInPicture
    re_pattern:
      '(private void exitFullscreen\(WebContents webContents, View contentView\)\s+\{[\s\S]+?resetExitFullscreenLayoutChangeListener\(contentView\);\n\s+)if \(webContents != null && !webContents\.isDestroyed\(\)\) webContents\.exitFullscreen\(\);'
    replace: |-
      \1BraveFullscreenHtmlApiHandlerBase self = BraveFullscreenHtmlApiHandlerBase.class.cast(this);
              if (!self.mSkipWebContentsExitFullscreenForPip
                      && webContents != null
                      && !webContents.isDestroyed()) {
                  webContents.exitFullscreen();
              }

  - description:
      Preserve fullscreen state while Brave-managed YouTube PiP is active when
      the activity stops
    re_pattern:
      '(public void onActivityStateChange\(Activity activity, int
      newState\)\s+\{\n\s+if\s+\(newState == ActivityState\.STOPPED &&
      mExitFullscreenOnStop\)\s+\{\n)([\s\S]*?\n)
      +mFullscreenManagerDelegate\.onExitFullscreen\(null\);(\n\s+\} else if
      \(newState == ActivityState\.DESTROYED\))'
    replace: |-
      \1            if (BraveFullscreenHtmlApiHandlerBase.class.cast(FullscreenHtmlApiHandlerBase.this).shouldPreservePersistentFullscreenForPictureInPicture(activity)) {
                      return;
                  }
      \2            mFullscreenManagerDelegate.onExitFullscreen(null);\3
