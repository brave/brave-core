substitutions:
  - description:
      Check at the top of the method if exiting fullscreen should be skipped to
      preserve the state while Brave-managed YouTube PiP is active when a tab is
      hidden
    re_pattern:
      '(public void onHidden\(Tab tab, @TabHidingType int reason\)\s+\{)'
    replace: |-
      \1
                              if (BraveFullscreenHtmlApiHandlerBase.class.cast(
                                              FullscreenHtmlApiHandlerBase.this)
                                      .maybeSkipExitFullscreenOnTabHidden(mActivity, reason)) {
                                  return;
                              }

  - description:
      Add a PiP-specific persistent fullscreen exit entry point,
      exitPersistentFullscreenModeForPictureInPicture, that tears down the
      browser fullscreen UI while preserving the WebContents (DOM) fullscreen
      state. It sets mSkipWebContentsExitFullscreenForPip on the Brave
      superclass for the duration of a single synchronous
      exitPersistentFullscreenMode() call and clears it in a finally block so
      the flag never leaks beyond that call.
    re_pattern:
      '(@Override\n\s+public void exitPersistentFullscreenMode\(\)\s+\{\n)'
    replace: |-
      public void exitPersistentFullscreenModeForPictureInPicture() {
              BraveFullscreenHtmlApiHandlerBase self = BraveFullscreenHtmlApiHandlerBase.class.cast(this);
              self.mSkipWebContentsExitFullscreenForPip = true;
              try {
                  exitPersistentFullscreenMode();
              } finally {
                  self.mSkipWebContentsExitFullscreenForPip = false;
              }
          }
          \1

  - description:
      Skip the WebContents (DOM) fullscreen exit for the Brave-managed PiP path
      by prepending the mSkipWebContentsExitFullscreenForPip flag (set by
      exitPersistentFullscreenModeForPictureInPicture) to the existing guard.
      The pattern only locates the if statement that calls
      webContents.exitFullscreen() and inserts at the start of its condition, so
      it does not depend on what the rest of that condition checks.
    re_pattern:
      '(private void exitFullscreen\(WebContents webContents, View
      contentView\)[\s\S]+?\n\s+if \()([^\n]*?\)
      webContents\.exitFullscreen\(\);)'
    replace:
      '\1!BraveFullscreenHtmlApiHandlerBase.class.cast(this).mSkipWebContentsExitFullscreenForPip
      && \2'

  - description:
      Insert an early return at the top of the ActivityState.STOPPED branch of
      onActivityStateChange so the fullscreen teardown
      (mFullscreenManagerDelegate.onExitFullscreen(null)) is skipped while a
      Brave-managed YouTube Picture-in-Picture session is active. This keeps the
      browser and DOM fullscreen state intact across transient activity stops
      (e.g. screen-off or PiP window occlusion) so there is no flicker when the
      user returns. The DESTROYED branch is intentionally left untouched.
    re_pattern:
      '(public void onActivityStateChange\(Activity activity, int
      newState\)\s+\{\n\s+if \(newState == ActivityState\.STOPPED &&
      mExitFullscreenOnStop\)\s+\{)'
    replace: |-
      \1
                  if (BraveFullscreenHtmlApiHandlerBase.class.cast(FullscreenHtmlApiHandlerBase.this)
                              .shouldPreservePersistentFullscreenForPictureInPicture(activity)) {
                      return;
                  }
