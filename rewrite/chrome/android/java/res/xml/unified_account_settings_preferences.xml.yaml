substitutions:
  - description: |-
      Add the AI Chat account toggle before the account section footer. Anchored
      on the footer preference, which is the stable last entry of the section.
    re_pattern:
      '(\n[ \t]*)(<[\w.]+\n[ \t]*android:key="account_section_footer")'
    replace:
      '\1<org.chromium.components.browser_ui.settings.ChromeSwitchPreference\1    android:key="account_section_ai_chat_toggle"\1    android:title="@string/brave_sync_ai_chat"\1    android:persistent="false"\1    app:isPreferenceVisible="false"/>\1\2'
