# Upstream's variable `update_app` contains the path to the new browser
# version's .app directory. As of this writing, it is computed as:
#     update_app="${update_dmg_mount_point}/${APP_DIR}"
# where
#     APP_DIR="$(basename "${installed_app_path}")"
# This fails when the browser's installation directory has a non-standard name.
# For example: If the browser is installed in /Applications/Brave.app instead of
# /Applications/Brave Browser.app, then `update_app` tries to read Brave.app
# from the DMG, when it should read Brave Browser.app. The substitution below
# fixes this.
[[substitution]]
description = 'Use PRODUCT_NAME instead of APP_DIR for update app path'
pattern = '${update_dmg_mount_point}/${APP_DIR}'
replace = '${update_dmg_mount_point}/${PRODUCT_NAME}.app'

# There are two installs scripts for updates in upstream: keystone_install.sh
# and .install.sh. Chrome uses the former but it has legacy code related to
# Keystone. The more modern alternative is .install.sh. But it lacks a fix
# from Chromium CL 5866112. This substitution applies it.
[[substitution]]
description = 'Omit perms, link and dir times when non-root'
pattern = 'RSYNC_FLAGS="--ignore-times --links --perms --recursive --times"'
replace = 'RSYNC_FLAGS="--ignore-times --links $(if [[ ${EUID} -eq 0 ]]; then echo "--perms --recursive --times"; else echo "--no-perms --executability --chmod=u=rwX,go=rX --recursive"; fi)"'

# .install.sh fails with exit code 12 in ~1% of update attempts. It is unclear
# why. The following two substitions attempt two possible fixes and report their
# effectiveness in the script's exit code. They do this in such a way that the
# externally-visible behavior of the script is unchanged. In particular, the
# script still fails even when one of the fixes is successful. The motivation
# for this is that right now, we only want to know which of the fixes (if any)
# can be successful. In a future change, only the effective fixes will be kept.
# The new exit codes have the following meanings:
#  90 mkdir of new versioned directory failed: read-only file system (EROFS).
#  91 mkdir of new versioned directory failed: no space / quota (ENOSPC/EDQUOT).
#  92 mkdir of new versioned directory failed: operation not permitted (EPERM,
#     e.g. App Management gate on macOS 13+, or endpoint security software).
#  93 mkdir of new versioned directory failed: permission denied (EACCES,
#     e.g. POSIX ownership or ACL mismatch on the installed bundle).
#  94 mkdir of new versioned directory failed: non-directory at path
#     (EEXIST/ENOTDIR; stale entry or TOCTOU with another process).
#  95 mkdir of new versioned directory failed: unclassified (see logged stderr).

[[substitution]]
description = 'Probe mkdir, classify the failure, initialize debug_flags'
pattern = 'note "rsyncing versioned directory"'
replace = '''note "rsyncing versioned directory"
    local debug_flags=0
    if [[ ! -d "${new_versioned_dir}" ]]; then
      debug_flags=1
      local mkdir_stderr
      if ! mkdir_stderr="$(mkdir -p "${new_versioned_dir}" 2>&1 1>/dev/null)"
      then
        case "${mkdir_stderr}" in
          *"Read-only file system"*)
            exit 90 ;;
          *"No space left on device"*|*"Disc quota exceeded"*)
            exit 91 ;;
          *"Operation not permitted"*)
            exit 92 ;;
          *"Permission denied"*)
            exit 93 ;;
          *"File exists"*|*"Not a directory"*)
            exit 94 ;;
          *)
            exit 95 ;;
        esac
      fi
      debug_flags=$((debug_flags | 2))
      rm -rf "${new_versioned_dir}"
    fi'''

[[substitution]]
description = '''Return debug_flags in exit code'

We anchor on upstream's `exit 12` because it is expected to remain unchanged.
The reasons are:
 1. The numeric value gets used in telemetry.
 2. It is documented at the top of the script.
 3. Other numeric error values in //chrome/updater are treated as unchangeable.

We start our custom codes at 80 in order to not clash with upstream's, even in
case they add new ones beyond the current maximum 16.
'''
pattern = 'exit 12'
replace = '''rsync ${RSYNC_FLAGS} --delete-before "${update_versioned_dir}" "${installed_versions_dir}" && (( debug_flags |= 4 ))
      rm -rf "${new_versioned_dir}"
      exit $((80 + debug_flags))'''
