substitutions:
  - description: |-
      Instantiate BraveExternalProcessImporterClient.

      Route the import through Brave's client subclass, which adds credit-card
      import and the Brave importer mojo pipeline.
    rename_class:
      class_name: ExternalProcessImporterClient
      rename: BraveExternalProcessImporterClient

  - description: |-
      Instantiate BraveInProcessImporterBridge.

      Pair the host with Brave's bridge subclass so the extra data types Brave
      imports are forwarded to the profile writer.
    rename_class:
      class_name: InProcessImporterBridge
      rename: BraveInProcessImporterBridge
