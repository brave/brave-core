substitutions:
  - description: |-
      Add a ShowImportLockDialog overload that takes a gfx::NativeView parent.

      Brave calls this dialog from contexts where only a NativeView is
      available.
    regex:
      re_pattern: '(void ShowImportLockDialog\()(.+?\);)'
      re_flags: [DOTALL]
      replace: |-
        \1\2

        \1gfx::NativeView parent_view,
                                  \2
