substitutions:
  - description: |-
      Add AddCreditCard to ProfileWriter.

      Brave imports credit cards, which upstream ProfileWriter has no method to
      persist; this declares the entry point implemented in the chromium_src
      override.
    add_to_public:
      class_name: ProfileWriter
      code: |-
        void AddCreditCard(const std::u16string& name_on_card,
                        const std::u16string& expiration_month,
                        const std::u16string& expiration_year,
                        const std::u16string& decrypted_card_number,
                        const std::string& origin);
