substitutions:
  - description: |
      Expose print preview render frame host accessors for extraction

      `GetPrintPreviewParams()` now requires `print_preview_rfh_` to match the
      requesting frame. Our screenshot print preview extractor drives print
      preview directly, without going through the PrintPreviewNow() /
      PrintPreviewDone() dialog flow that normally sets `print_preview_rfh_`, so
      expose a narrow pair of public accessors it can use to satisfy that
      requirement.
    regex:
      re_pattern: '(  ~PrintViewManager\(\) override;)'
      replace: |-
        \1

          void SetPrintPreviewRenderFrameHostForExtraction(
              content::RenderFrameHost* rfh);
          void ClearPrintPreviewRenderFrameHostForExtraction();
