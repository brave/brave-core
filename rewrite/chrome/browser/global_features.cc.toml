[[comby-substitution]]
description = 'Construct BraveGlobalFeatures instead of GlobalFeatures'
pattern = 'new GlobalFeatures()'
replace = 'CreateBraveGlobalFeatures()'

[[comby-substitution]]
description = 'Forward declare CreateBraveGlobalFeatures before the anonymous namespace'
# `:[body]` closes the brace pair so comby treats the pattern as a
# balanced block; bare `namespace {` doesn't match under the .cpp
# matcher.
pattern = 'namespace {:[body]}'
replace = '''GlobalFeatures* CreateBraveGlobalFeatures();
namespace {:[body]}'''
