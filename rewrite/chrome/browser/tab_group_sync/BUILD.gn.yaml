substitutions:
  - description: |-
      Add Brave sources to the tab group sync library.
    re_pattern: |-
      (android_library\("java"\).*?)\n  \}
    re_flags: [DOTALL]
    replace: |-
      \1
          import("//brave/browser/tab_group_sync/android/sources.gni")
          sources += brave_browser_tab_group_sync_java_sources
        }
