substitutions:
  - description: 'Make RemoveNonModelData virtual'
    make_virtual:
      class_name: SiteSettingsHandler
      method_name: RemoveNonModelData

  # TODO(brave.dev/b/57129): Switch to add_friend once it can be used here.
  # SiteSettingsHandler contains a nested class with its own private: section, so
  # class_name: SiteSettingsHandler matches two private sections. Until that is
  # sorted, anchor on the unique existing friend declaration instead.
  - description: 'Friend BraveSiteSettingsHandler'
    regex:
      re_pattern: '(friend class SiteSettingsHandlerBaseTest;)'
      replace: |-
        \1
          friend class BraveSiteSettingsHandler;
