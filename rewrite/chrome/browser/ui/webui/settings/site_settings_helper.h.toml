[[substitution]]
description = 'Insert Brave `SiteSettingSource` entries before kNumSources sentinel'
re_pattern = '(enum class SiteSettingSource\s*\{.*?)(\n\s*kNumSources,)'
re_flags = ['DOTALL']
count = 1
replace = '''\1
  kRemoteList,\2'''
