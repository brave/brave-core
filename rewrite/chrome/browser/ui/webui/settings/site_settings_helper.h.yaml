substitutions:
  - description:
      'Insert Brave `SiteSettingSource` entries before kNumSources sentinel'
    regex:
      re_pattern: '(enum class SiteSettingSource\s*\{.*?)(\n\s*kNumSources,)'
      re_flags: [DOTALL]
      replace: |-
        \1
          kRemoteList,\2

    count: 1
