substitutions:
  - description: |
      Register profile_customization_app-chromium.js on the WebUI data source.

      profile_customization_ui.cc registers its JS files manually (it does not
      use a grit-generated resource map). Our chromium_src override of
      profile_customization_app.ts imports the upstream module as
      profile_customization_app-chromium.js, so that path must be served or the
      dialog fails to load and appears blank.
    regex:
      re_pattern: '(\{"profile_customization_app\.js",\s*IDR_SIGNIN_PROFILE_CUSTOMIZATION_PROFILE_CUSTOMIZATION_APP_JS\},)'
      replace: |-
        \1
              {"profile_customization_app-chromium.js",
               IDR_SIGNIN_PROFILE_CUSTOMIZATION_PROFILE_CUSTOMIZATION_APP_CHROMIUM_JS},
