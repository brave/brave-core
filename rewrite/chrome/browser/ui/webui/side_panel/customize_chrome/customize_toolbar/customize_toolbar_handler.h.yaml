substitutions:
  - description: |-
      Add "Brave action " observations to CustomizeToolbarHandler.

      New methods are added: ObserveBraveAction(), OnBraveActionPinnedChanged()
    re_pattern: |-
      (class CustomizeToolbarHandler.*?void OnActionItemChanged\(.*?\);)
    re_flags: [DOTALL]
    replace: |-
      \1
        void ObserveBraveActions();
        void OnBraveActionPinnedChanged(
            side_panel::customize_chrome::mojom::ActionId action_id);
