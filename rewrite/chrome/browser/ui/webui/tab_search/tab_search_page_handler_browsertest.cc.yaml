substitutions:
  - description: |
      Mock Brave's `[BraveExtend] interface Page` methods in MockPage

      Brave extends the `tab_search.mojom` `Page` interface with
      `TabFocusShowFREChanged` and `TabFocusEnabledChanged` (see
      brave/chromium_src/chrome/browser/ui/webui/tab_search/tab_search.mojom).
      Those become pure virtual methods on `tab_search::mojom::Page`, so
      upstream's `MockPage` must mock them or it stays abstract.
    add_to_public:
      class_name: MockPage
      code: |-
        MOCK_METHOD(void, TabFocusShowFREChanged, (bool show));
        MOCK_METHOD(void, TabFocusEnabledChanged, (bool enabled));
