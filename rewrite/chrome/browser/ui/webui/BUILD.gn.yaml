substitutions:
  - description: |
      Pull in the variable list for the Brave additions to
      `source_set("configs")`.

      Inserted at the top of the file.
    re_pattern: '(# found in the LICENSE file\.\n\n)'
    replace: |
      \1import("//brave/browser/ui/webui/sources.gni")

  - description: |
      Append Brave deps to `source_set("configs")`.
    re_pattern: '(source_set\("configs"\).*?\bdeps\s*=\s*\[.*?\])'
    re_flags: [DOTALL]
    replace: '\1\n  deps += brave_browser_ui_webui_configs_deps'
