[[substitution]]
description = '''
Wrap PageActionControllerImpl in a chromium_impl namespace.

The abstract PageActionController base, ScopedPageActionActivity and other
free declarations are intentionally left in page_actions::; only the concrete
impl class is wrapped, so we can shadow it with our own implementation.
'''
re_pattern = '(class PageActionControllerImpl[\s\S]*?\n\};)'
replace = '''namespace chromium_impl {
\1
}  // namespace chromium_impl
'''

[[substitution]]
description = '''
Make CreateModel virtual so the brave PageActionControllerImpl override can
replace model construction with the brave PageActionModel.
'''
pattern = 'std::unique_ptr<PageActionModelInterface> CreateModel('
replace = 'virtual std::unique_ptr<PageActionModelInterface> CreateModel('

[[substitution]]
description = '''
Friend the brave page_actions::PageActionControllerImpl so it can reach the
private members it relies on (FindPageActionModel, page_action_model_factory_).
The lazy match anchors on the first `private:` inside PageActionControllerImpl.
'''
re_pattern = '(class PageActionControllerImpl.*?\bprivate:)'
re_flags = ['DOTALL']
replace = '''\1
  friend class ::page_actions::PageActionControllerImpl;'''

[[substitution]]
description = '''
Replace PassKey<PageActionView> with PassKey<page_actions::PageActionView>.
As the chromium_impl::PageActionView should be shadowed by the brave-specific
implementation, replaces all occurrences of declaration of PassKey<PageActionView>
with PassKey<page_actions::PageActionView>.
'''
pattern = 'PassKey<PageActionView>'
replace = 'PassKey<::page_actions::PageActionView>'
count = 0 # 0 means replace all occurrences

[[substitution]]
description = '''
Replace PageActionView* with chromium_impl::PageActionView* in
chromium_impl::PageActionView. As chromium_impl::PageActionView depends on 
the controller's interface directly, we need to use chromium_impl::PageActionView*
'''
pattern = 'PageActionView*'
replace = 'chromium_impl::PageActionView*'
count = 0 # 0 means replace all occurrences
