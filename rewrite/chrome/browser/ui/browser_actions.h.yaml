substitutions:
  - description: 'Make the destructor virtual'
    make_virtual:
      class_name: BrowserActions
      method_name: '~BrowserActions'

  - description: 'Make InitializeBrowserActions virtual'
    make_virtual:
      class_name: BrowserActions
      method_name: InitializeBrowserActions

  - description: 'Friend BraveBrowserActions'
    add_friend:
      class_name: BrowserActions
      friend_type: class BraveBrowserActions
