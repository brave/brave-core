substitutions:
  - description: |
      Disable HaTS surveys entirely

      Every survey-show decision funnels through `RunCommonLaunchChecks()`: both
      the public `CanShowSurvey()` and the internal launch path
      (`ShowSurvey()` -> `RunLaunchChecks()` -> `RunCommonLaunchChecks()`) call
      it. Returning a non-kNone error here aborts the launch before a dialog is
      created and makes `CanShowSurvey()` return false.
    preempt_function_impl:
      function_name: HatsServiceDesktop::RunCommonLaunchChecks
      code: |-
        if ((true)) return LaunchError::kError;
