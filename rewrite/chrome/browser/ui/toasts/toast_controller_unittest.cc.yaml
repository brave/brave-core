# Brave hides the "link copied" and "image copied" toasts entirely (see the
# Brave-side tests added in the chromium_src wrapper). The upstream test
# fixtures still need a valid `ToastId` to exercise the controller paths, so
# redirect them to a couple of toasts we don't suppress.

substitutions:
  - description:
      'Redirect upstream kLinkCopied tests to a non-suppressed toast.'
    pattern: 'ToastId::kLinkCopied'
    count: 0
    replace: 'ToastId::kLinkToHighlightCopied'

  - description:
      'Redirect upstream kImageCopied tests to a non-suppressed toast.'
    pattern: 'ToastId::kImageCopied'
    count: 0
    replace: 'ToastId::kClearBrowsingData'
