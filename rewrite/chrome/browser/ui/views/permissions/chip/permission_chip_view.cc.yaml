substitutions:
  - description: |
      Size the permission activity chip with page-info icon padding.

      Uses LOCATION_BAR_PAGE_INFO_ICON_PADDING so the chip tracks site-info
      insets in both normal (VH(6,6)) and compact (VH(4,6)) modes — matching
      width to the lock icon without overflowing the compact omnibar.
    regex:
      re_pattern: |-
        gfx::Insets PermissionChipView::GetPadding\(\) const \{
          return gfx::Insets\(
              GetLayoutConstant\(LayoutConstant::kLocationBarChipPadding\)\);
        \}
      replace: |-
        gfx::Insets PermissionChipView::GetPadding() const {
          return GetLayoutInsets(LOCATION_BAR_PAGE_INFO_ICON_PADDING);
        }
