substitutions:
  - description:
      'Anchor the tab search bubble to the button with its TOP_LEFT corner only
      for the vertical tab strip; for horizontal tab strips it stays TOP_RIGHT
      so the bubble opens to the left of the trailing-edge combo button. Drops
      the kLeadingHorizontalTabstrip branch, leaving only the kVerticalTabstrip
      condition.'
    re_pattern:
      'position == tabs::TabSearchPosition::kLeadingHorizontalTabstrip \|\|\s+'
    replace: ''
