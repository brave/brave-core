[[substitution]]
description = 'Adding interfaces to PageActionController in order to customize PageActionView'
re_pattern = '(class PageActionController {[\s\S]*?~PageActionController\(\) = default;)'
replace = '''\1

  // Force the label to be shown regardless of the available space
  virtual void SetAlwaysShowLabel(actions::ActionId action_id,
                                  bool always_show) = 0;

  // Override the colors of the chip
  virtual void OverrideChipColors(
      actions::ActionId action_id,
      std::optional<SkColor> override_background_color,
      std::optional<SkColor> override_foreground_color) = 0;
  virtual void ClearOverrideChipColors(actions::ActionId action_id) = 0;

  // Override the height of the PageActionView
  virtual void SetOverrideHeight(actions::ActionId action_id,
                                 int height) = 0;
  virtual void ClearOverrideHeight(actions::ActionId action_id) = 0;

  // When set, `PageActionView::IsTriggerableEvent` uses this callback instead of
  // the default logic. Pass nullopt to clear.
  virtual void SetOverrideTriggerableEvent(actions::ActionId action_id, 
                                           std::optional<int> event_flags) = 0;'''


[[substitution]]
description = 'Implementing the interfaces in PageActionControllerImpl'
re_pattern = '(class PageActionControllerImpl :[\s\S]*?~PageActionControllerImpl\(\) override;)'
replace = '''\1

  void SetAlwaysShowLabel(actions::ActionId action_id,
                          bool always_show) override;
  void OverrideChipColors(actions::ActionId action_id,
      std::optional<SkColor> override_background_color,
      std::optional<SkColor> override_foreground_color) override;
  void ClearOverrideChipColors(actions::ActionId action_id) override;
  void SetOverrideHeight(actions::ActionId action_id,
                         int height) override;
  void ClearOverrideHeight(actions::ActionId action_id) override;
  void SetOverrideTriggerableEvent(actions::ActionId action_id,
                                   std::optional<int> event_flags) override;'''
