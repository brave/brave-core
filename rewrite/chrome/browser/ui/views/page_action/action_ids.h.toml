[[comby-substitution]]
description = 'Add kActionShowPartitionedStorage as the second entry of kActionIds'
# `:[[first]]` matches just the first identifier; `:[rest]` captures
# the remaining entries verbatim (including their newlines and indent)
# via comby's balanced-delimiter hole semantics.
pattern = '''std::to_array<actions::ActionId>({
    :[[first]],
    :[rest]
})'''
replace = '''std::to_array<actions::ActionId>({
    :[[first]],
    kActionShowPartitionedStorage,
    :[rest]
})'''
