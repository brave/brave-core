substitutions:
  - description: |
      Zero out `kSplitViewContentInset`.

      Brave controls split-view padding via the rounded-corners feature
      instead. The constant is referenced both inside and outside
      `MultiContentsView`, so adjusting it here is preferable to zeroing
      the inset fields in the constructor.
    re_pattern: 'kSplitViewContentInset = 8;'
    replace: 'kSplitViewContentInset = 0;'

  - description: |
      Make `GetActiveContentsContainerView` virtual.

      `BraveMultiContentsView` overrides this hook to return the
      web-panel container when a web panel is active.
    make_virtual:
      class_name: MultiContentsView
      method_name: GetActiveContentsContainerView

  - description: |
      Make `GetContentsContainerViewFor` virtual.

      `BraveMultiContentsView` overrides this hook to return the
      web-panel container for the web-panel `WebContents`.
    make_virtual:
      class_name: MultiContentsView
      method_name: GetContentsContainerViewFor

  - description: |
      Make `GetActiveContentsView` virtual.

      `BraveMultiContentsView` overrides this hook to return the
      web-panel's contents view when a web panel is active.
    make_virtual:
      class_name: MultiContentsView
      method_name: GetActiveContentsView

  - description: |
      Declare `ResetResizeArea` as a virtual no-op hook.

      `BraveMultiContentsView` overrides this to reset the resize area
      when the web-panel layout changes.
    re_pattern: '( +)(void SetBackgroundRadii\([^)]*\);)'
    replace: |-
      \1\2
      \1virtual void ResetResizeArea() {}

  - description: |
      Make `ExecuteOnEachVisibleContentsView` virtual.

      `BraveMultiContentsView` overrides this hook to include the
      web-panel contents view when iterating visible contents.
    make_virtual:
      class_name: MultiContentsView
      method_name: ExecuteOnEachVisibleContentsView

  - description: |
      Make `OnWebContentsFocused` virtual.

      `BraveMultiContentsView` overrides this hook to intercept focus on
      the web-panel contents.
    make_virtual:
      class_name: MultiContentsView
      method_name: OnWebContentsFocused

  - description: |
      Make `UpdateContentsBorderAndOverlay` virtual.

      `BraveMultiContentsView` overrides this hook to adjust the borders
      and overlays for the web-panel layout.
    make_virtual:
      class_name: MultiContentsView
      method_name: UpdateContentsBorderAndOverlay

  - description: |
      Friend `BraveMultiContentsView` from the base class.

      The Brave subclass overrides private virtuals declared above
      (`ResetResizeArea`, `UpdateContentsBorderAndOverlay`,
      `OnWebContentsFocused`, `ExecuteOnEachVisibleContentsView`) and
      reads private members such as `contents_container_views_`.
    add_friend:
      class_name: MultiContentsView
      friend_type: class BraveMultiContentsView
