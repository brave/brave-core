# Note: MaybeUpdateCachedFrameButtonImages is already declared `virtual`
# upstream, so no make_virtual substitution is needed — only the friend
# declaration so BraveBrowserFrameViewLinuxNative can reach private members
# (nav_button_provider_, cache_).
substitutions:
  - description: 'Friend BraveBrowserFrameViewLinuxNative'
    add_friend:
      class_name: BrowserFrameViewLinuxNative
      friend_type: class BraveBrowserFrameViewLinuxNative
