substitutions:
  - description: |-
      Make AnnouncePageOpened virtual

      This lets subclasses hook into page switch events to update the view
      hierarchy after a new page or subpage is shown.
    make_virtual:
      class_name: PageInfoBubbleView
      method_name: AnnouncePageOpened

  - description: 'Friend BravePageInfoBubbleView'
    add_friend:
      class_name: PageInfoBubbleView
      friend_type: class BravePageInfoBubbleView
