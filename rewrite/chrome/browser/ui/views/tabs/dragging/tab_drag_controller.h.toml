[[ast-substitution]]
description = 'Add virtual keyword to Init() so Brave can override it in a subclass'
pattern = '[[nodiscard]] Liveness Init($$$ARGS);'
replace = '[[nodiscard]] virtual Liveness Init($$$ARGS);'
