[[comby-substitution]]
description = 'Add virtual keyword to Init() so Brave can override it in a subclass'
# `:[args]` closes the open `(` so comby's .cpp matcher accepts the
# pattern; the captured args are re-emitted verbatim, preserving the
# original multi-line argument list formatting.
pattern = '[[nodiscard]] Liveness Init(:[args])'
replace = '[[nodiscard]] virtual Liveness Init(:[args])'
