substitutions:
  - description: Drop `final` from DraggingTabsSession to allow subclassing.
    remove_final:
      class_name: DraggingTabsSession

  - description:
      Make the DraggingTabsSession destructor virtual for subclassing.
    make_virtual:
      class_name: DraggingTabsSession
      method_name: '~DraggingTabsSession'
