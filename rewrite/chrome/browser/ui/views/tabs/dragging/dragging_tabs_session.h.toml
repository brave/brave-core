[[comby-substitution]]
description = 'Remove final keyword from DraggingTabsSession to allow subclassing'
# `:[body]` closes the brace pair (bare `class X final {` doesn't
# match) and is re-emitted verbatim, so the class body's original
# formatting is preserved.
pattern = 'class DraggingTabsSession final {:[body]}'
replace = 'class DraggingTabsSession {:[body]}'

[[comby-substitution]]
description = 'Make ~DraggingTabsSession destructor virtual to allow subclassing'
pattern = '~DraggingTabsSession();'
replace = 'virtual ~DraggingTabsSession();'
