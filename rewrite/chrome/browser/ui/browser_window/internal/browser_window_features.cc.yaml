substitutions:
  - description: |
      Pass `vertical tab controller` to the WindowFeatureController CreateInstance call

      `WindowFeatureController` takes the owning `vertical_tab_controller` as its
      last constructor argument for Brave-specific code. The non-greedy regex captures the full
      argument list (no matter how many arguments upstream chooses to pass) and
      appends `vertical tab controller` immediately before the closing `);`.
    re_pattern: '(CreateInstance<WindowFeatureController>\(.*?)(\);)'
    re_flags: [DOTALL]
    replace: '\1, *browser->GetFeatures().vertical_tab_controller()\2'
