substitutions:
  - description: |
      Declare virtual hooks to handle DownloadCommands::kDeleteLocalFile and
      DownloadCommands::kCopyDownloadLink commands.

      These are internal hooks invoked from ExecuteCommand and overridden by
      Brave (see chromium_src download_item_model), so they belong in the
      protected section of the upstream DownloadUIModel class.
    add_to_protected:
      class_name: DownloadUIModel
      code: |-
        // Brave: virtual hooks for kDeleteLocalFile / kCopyDownloadLink commands.
        virtual void DeleteLocalFile() {}
        virtual void CopyDownloadLinkToClipboard() {}
