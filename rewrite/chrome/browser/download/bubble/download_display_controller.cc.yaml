substitutions:
  - description: |
      Show the toolbar button while a download is in progress.

      After the upstream UpdateToolbarButtonState runs, Brave also shows the
      toolbar button when there's at least one in-progress download item. The
      decision is computed by ShouldShowToolbarButtonForInProgressDownload,
      defined in the chromium_src override.
    after_function_impl:
      function_name: DownloadDisplayController::UpdateToolbarButtonState
      code: |-
        if (ShouldShowToolbarButtonForInProgressDownload(
                info, display_, bubble_controller_, browser_)) {
          ShowToolbarButton();
        }
