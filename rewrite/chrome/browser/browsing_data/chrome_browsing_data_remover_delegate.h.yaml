substitutions:
  - description: |
      Befriend BraveBrowsingDataRemoverDelegate
    add_friend:
      class_name: ChromeBrowsingDataRemoverDelegate
      friend_type: class BraveBrowsingDataRemoverDelegate

  - description: |
      Append kIPFSCache as the new last data-removal task
    regex:
      re_pattern: |-
        (\n[ \t]*)kMaxValue = (\w+),
      replace: |-
        \1kIPFSCache = \2 + 1,\1kMaxValue = kIPFSCache,
