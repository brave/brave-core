substitutions:
  - description: |
      Return the histogram suffix for the kIPFSCache task
    regex:
      re_pattern: |-
        (ChromeBrowsingDataRemoverDelegate::GetHistogramSuffix\(.*?switch \(task\) \{\n)
      re_flags: [DOTALL]
      replace: |
        \1    case TracingDataType::kIPFSCache:
              return "IPFSCache";
