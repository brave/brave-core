substitutions:
  - description: |
      Allow Brave internal pages to break out of favicon theming.

      Consult ShouldThemifyFaviconForEntryBraveImpl (defined in the chromium_src
      override) first: when it returns a value, honor it, carry on with the
      upstream implementation.
    preempt_function_impl:
      function_name: ShouldThemifyFaviconForEntry
      code: |-
        if (auto brave_themify = ShouldThemifyFaviconForEntryBraveImpl(entry)) {
          return *brave_themify;
        }
