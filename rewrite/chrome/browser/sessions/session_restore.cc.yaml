substitutions:
  - description: 'Modify navigation params before Navigate call for startup tab'
    regex:
      re_pattern: |-
        (.+)(Navigate\(&params\);)
      replace: |-
        \1BraveModifyStartupTabNavigationParams(startup_tab, browser, params);
        \1\2
