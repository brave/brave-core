substitutions:
  - description: 'Point Learn More link to the Brave support article.'
    regex:
      re_pattern: '(kLearnMoreLink[^=]*=\s*)(?:"[^"]*"\s*)+;'
      replace: '\1"https://support.brave.app/hc/en-us/articles/15513090104717";'

    count: 1
