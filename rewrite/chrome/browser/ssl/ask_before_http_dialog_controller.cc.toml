[[substitution]]
description = 'Delete unused kLearnMoreLink, may use several lines.'
re_pattern = '^[^\n]*kLearnMoreLink\[\] =[^;]*;\n?'
replace = ''
re_flags = ['MULTILINE']
count = 1

[[substitution]]
description = 'Replace learn more link with ours.'
pattern = 'kLearnMoreLink'
replace = 'kBraveLearnMoreLink'
