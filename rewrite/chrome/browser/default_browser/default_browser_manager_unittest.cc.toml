[[substitution]]
description = '''profile_ is initialized before calling 
                 SetUpGlobalFeaturesForTesting which makes the profile bind to
                 old deleted global features. When the profile is destroyed in
                 TearDown it crashes trying to delete BrowserTabStripTracker in
                 BraveWalletServiceDelegateImpl. Move profile creation to after
                 calling SetUpGlobalFeaturesForTesting.'''
re_pattern = '''(void SetUp\(\) override \{[\s\S]+?)
    profile_ = std::make_unique<TestingProfile>\(\);

(    TestingBrowserProcess::GetGlobal\(\)->SetUpGlobalFeaturesForTesting\(
        /\*profile_manager=\*/false\);)'''
replace = '''\1\2
    profile_ = std::make_unique<TestingProfile>();
'''