[[substitution]]
description = '''TearDownGlobalFeaturesForTesting is called in
                 TestingBrowserProcess destractor and should not be called in
                 TearDown before profile is destroyed.'''
re_pattern = '''(void TearDown\(\) override \{
)    TestingBrowserProcess::GetGlobal\(\)->TearDownGlobalFeaturesForTesting\(\);
([^\}]+?)(\})'''
replace = '\1\2\3'
