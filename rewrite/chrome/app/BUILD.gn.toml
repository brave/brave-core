[[plaster]]
description = "Adding deps to generated_resources grit."
pattern = '(grit\("generated_resources"\)\s*\{.*?)(\n\})'
replace = '''\1
  deps = [ "//brave/app:brave_generated_resources_grit" ]\2'''
flags = "DOTALL"
