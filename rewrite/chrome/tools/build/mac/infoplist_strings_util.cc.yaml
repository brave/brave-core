substitutions:
  - description: |
      Initialise `name` with `BRAVE_PRODUCT_STRING`

      Keep the upstream `LoadStringFromDataPack` call as a dead ternary branch so
      `name_id` / `name_id_str` stay referenced and don't trip unused-variable
      warnings.
    regex:
      re_pattern:
        'std::string name = (LoadStringFromDataPack\(.*?name_id_str\));'
      re_flags: [DOTALL]
      replace: 'std::string name = ((true)) ? BRAVE_PRODUCT_STRING : \1;'
