substitutions:
  - description: |-
      Add the AI Chat flags to the getSyncAllPrefs() fixture, grouped after the
      wifiConfigurations type flags.
    re_pattern: '(\n[ \t]*)wifiConfigurationsSynced: true,'
    replace:
      '\1wifiConfigurationsSynced: true,\1aiChatManaged:
      false,\1aiChatRegistered: true,\1aiChatSynced: true,'
