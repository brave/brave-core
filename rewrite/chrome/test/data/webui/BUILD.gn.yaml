substitutions:
  - description: |-
      Build the Brave settings WebUI test grdp into the shared chrome://webui-test
      resources, so brave_browser_tests can RunTest() Brave settings mocha tests.
    re_pattern: '(\n[ \t]*)"settings:build_grdp",'
    replace: '\1"settings:build_grdp",\1"//brave/test/data/webui/settings:build_grdp",'

  - description: |-
      Include the Brave settings WebUI test resources.grdp in the combined grd.
    re_pattern: '(\n[ \t]*)"\$target_gen_dir/settings/resources\.grdp",'
    replace: '\1"$target_gen_dir/settings/resources.grdp",\1"$root_gen_dir/brave/test/data/webui/settings/resources.grdp",'
