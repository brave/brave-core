[[substitution]]
description = '''Using `chromium_impl::CookieMonster` for this type.

`CookieMonsterChangeDispatcher` has to use `chromium_impl::CookieMonster`
because it gets used by the Chromium implementation of `CookieMonster`.
'''
re_pattern = '\bCookieMonster\b'
replace = 'chromium_impl::CookieMonster'
count = 4

[[substitution]]
description = 'Fixing foward decl for chromium_impl::CookieMonster.'
re_pattern = 'class chromium_impl::CookieMonster;'
replace = '''namespace chromium_impl {
class CookieMonster;
}'''
