[[substitution]]
description = '''Mark `ECDSA_SHA384` as unsupported in `SelectAlgorithm` and `GenerateSigningKeySlowly`.

Both switch statements fall through to RSA_PSS_SHA256's `continue` since the
software provider does not support ECDSA_SHA384 key generation.
'''
re_pattern = '(switch\s*\(algo\).*?)(\n\s*continue;\s*// Not supported)'
re_flags = ['DOTALL']
count = 3
replace = '''\1
        case SignatureVerifier::SignatureAlgorithm::ECDSA_SHA384:\2'''
