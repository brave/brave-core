substitutions:
  - description: |
      Mark `ECDSA_SHA384` as an unsupported algorithm.

      The software provider does not support `ECDSA_SHA384` key generation, so
      it must fall through to the `continue;  // Not supported` arm in each
      `switch (algo)`. This adds the missing `case` to all three switches
      (`SelectAlgorithm`, `GenerateSigningKeySlowly` and
      `GenerateAttestationKeySlowly`), grouping it with `RSA_PSS_SHA256` which
      already takes that path.
    re_pattern: '(switch\s*\(algo\).*?)(\n\s*continue;\s*// Not supported)'
    re_flags: [DOTALL]
    count: 3
    replace: |-
      \1
              case SignatureVerifier::SignatureAlgorithm::ECDSA_SHA384:\2
