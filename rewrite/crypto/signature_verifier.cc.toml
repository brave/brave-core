[[substitution]]
description = '''Add `ECDSA_SHA384` handling to `VerifyInit`.

Sets EVP_PKEY_EC with SHA-384 digest, mirroring the ECDSA_SHA256 case.
'''
re_pattern = '(VerifyInit\([^)]*\)\s*\{.*?\n\s*switch[^{]*\{.*?)(\n\s*\})'
re_flags = ['DOTALL']
replace = '''\1
    case ECDSA_SHA384:
      pkey_type = EVP_PKEY_EC;
      digest = EVP_sha384();
      break;\2'''
