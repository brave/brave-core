substitutions:
  - description: |
      Declare WebLocalFrame::SetOriginForClearWindowNameCheck

      Brave adds this pure virtual to seed the origin used by the
      clear-window-name check.
    regex:
      re_pattern:
        '(class BLINK_EXPORT WebLocalFrame : public WebFrame \{\n public:)'
      replace: |
        \1
          virtual void SetOriginForClearWindowNameCheck(const url::Origin&) = 0;
