substitutions:
  - description: |
      Declare WebLocalFrameImpl::SetOriginForClearWindowNameCheck

      Overrides the WebLocalFrame method Brave adds; defined in the chromium_src
      web_local_frame_impl.cc override.
    regex:
      re_pattern: '(// WebLocalFrame overrides:)'
      replace: |-
        \1
          void SetOriginForClearWindowNameCheck(const url::Origin&) override;
