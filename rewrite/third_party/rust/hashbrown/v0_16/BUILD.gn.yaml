substitutions:
  - description: |
      Append Brave-specific deps and features to the hashbrown crate.
    re_pattern: '(  proc_macro_configs \+= _configs_to_add\n)\}'
    replace: |-
      \1
        deps += [
          "//brave/third_party/rust/allocator_api2/v0_2:lib",
          "//brave/third_party/rust/equivalent/v1:lib",
        ]
        features += [
          "allocator-api2",
          "default",
          "equivalent",
          "inline-more",
        ]
      }

  - description: 'Allow hashbrown to be used outside of test targets'
    pattern: 'testonly = true'
    replace: 'testonly = false'
