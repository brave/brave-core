substitutions:
  - description: |
      Retry the config lookup with the parent domain so a WebUIConfig whose
      host was registered via RegisterUntrustedSubdomainHost() also serves its
      single-label subdomains. GetRegisteredParentOrigin() is defined in the
      chromium_src override.
    regex:
      re_pattern: '(auto origin_and_config = configs_map_\.find\(url::Origin::Create\(url\)\);)'
      replace: |-
        \1
          if (origin_and_config == configs_map_.end()) {
            origin_and_config = configs_map_.find(GetRegisteredParentOrigin(url));
          }
