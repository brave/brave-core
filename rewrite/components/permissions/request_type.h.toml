[[substitution]]
description = 'Add Brave-specific entries to `RequestType`'
re_pattern = '(\bkStorageAccess\b,)'
replace = '''\1
  kWidevine,
  kBraveEthereum,
  kBraveSolana,
  kBraveOpenAIChat,
  kBraveGoogleSignInPermission,
  kBraveCardano,
  kBraveMinValue = kWidevine,
  kBraveMaxValue = kBraveCardano,'''
