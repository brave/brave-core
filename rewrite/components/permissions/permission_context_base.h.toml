[[comby-substitution]]
description = '''Wrap PermissionContextBase class in chromium_impl namespace

The class definition is moved into a `chromium_impl` detail namespace so
Brave can shadow it with its own `PermissionContextBase` that derives from
the chromium_impl one. The trailing blank line (between class `};` and
`}  // namespace permissions`) is consumed into the match and re-emitted
between the class and the new `}  // namespace chromium_impl`, so the
generated patch is byte-identical to the regex form's output.'''
pattern = '''class PermissionContextBase :[head] {:[body]};

'''
replace = '''namespace chromium_impl {
class PermissionContextBase :[head] {:[body]};

}  // namespace chromium_impl
'''

[[comby-substitution]]
description = 'Make PermissionDecided virtual so the Brave subclass can override it'
# `:[args]` closes the `(`; bare `void PermissionDecided(` doesn't
# match under the .cpp matcher.
pattern = 'void PermissionDecided(:[args])'
replace = 'virtual void PermissionDecided(:[args])'

[[comby-substitution]]
description = 'Friend the Brave PermissionContextBase in chromium_impl::PermissionContextBase'
pattern = 'private:'
replace = '''private:
  friend class ::permissions::PermissionContextBase;'''
