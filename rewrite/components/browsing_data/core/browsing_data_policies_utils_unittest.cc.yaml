substitutions:
  - description:
      'Add the kAIChat selectable type to the checked sync types in the
      AllSyncTypesChecked test.'
    re_pattern: 'syncer::UserSelectableType::kReadingList\};'
    replace:
      'syncer::UserSelectableType::kReadingList,
      syncer::UserSelectableType::kAIChat};'
