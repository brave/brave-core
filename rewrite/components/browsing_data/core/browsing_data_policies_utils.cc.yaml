substitutions:
  - description:
      "Bump the kLastType static_assert for Brave's extra UserSelectableType
      items"
    re_pattern: 'static_assert\(static_cast<int>\(syncer::UserSelectableType::kLastType\)\s*==\s*13,'
    replace:
      'static_assert(static_cast<int>(syncer::UserSelectableType::kLastType) ==
      14,'
