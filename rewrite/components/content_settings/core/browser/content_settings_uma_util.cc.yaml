substitutions:
  - description: |-
      Handle `kRemoteListProvider` in `GetProviderNameForHistograms`

      Brave adds the `kRemoteListProvider` provider type, so the switch must
      name it to stay exhaustive.
    regex:
      re_pattern: '(GetProviderNameForHistograms.+?switch \(provider_type\) \{)'
      re_flags: [DOTALL]
      replace: |-
        \1
            case ProviderType::kRemoteListProvider:
              return "RemoteListProvider";
