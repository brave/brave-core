# `UserActionableError::{kNeedsSettingsConfirmation,kUnrecoverableError}` were
# removed on Android in upstream cr149 (https://chromium-review.googlesource.com/c/chromium/src/+/7772435),
# but the case labels in this file are still gated only by `!IS_IOS`. Upstream Android doesn't compile
# this file, but Brave does (`use_login_database_as_backend = true`), so the
# guard needs `!IS_ANDROID` too.

[[substitution]]
description = 'Exclude removed UserActionableError values on Android'
re_pattern = '''#if !BUILDFLAG\(IS_IOS\)\n(    case SyncError::kNeedsSettingsConfirmation:\n    case SyncError::kUnrecoverableError:\n)#endif  // !BUILDFLAG\(IS_IOS\)'''
replace = '''#if !BUILDFLAG(IS_IOS) && !BUILDFLAG(IS_ANDROID)
\1#endif  // !BUILDFLAG(IS_IOS) && !BUILDFLAG(IS_ANDROID)'''
count = 3
