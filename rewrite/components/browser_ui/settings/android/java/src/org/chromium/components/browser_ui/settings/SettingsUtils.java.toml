# Make addVisiblePreferences package-private so BraveSettingsUtils (same package)
# can call it from the bytecode-redirected getVisiblePreferences implementation.

[[substitution]]
description = 'Make addVisiblePreferences package-private'
re_pattern = 'private static void addVisiblePreferences\('
replace = 'static void addVisiblePreferences('
count = 1
