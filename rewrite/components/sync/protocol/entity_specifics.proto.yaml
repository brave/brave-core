substitutions:
  - description: 'Import the Brave AI Chat specifics proto.'
    re_pattern:
      'import
      "components/sync/protocol/accessibility_annotation_specifics.proto";'
    replace: |-
      import "components/sync/protocol/accessibility_annotation_specifics.proto";
      import "brave/components/sync/protocol/ai_chat_specifics.proto";

  - description: 'Add the AI Chat conversation field to EntitySpecifics.'
    re_pattern:
      '(\n[
      \t]*)AccessibilityAnnotationSpecifics\s+accessibility_annotation\s*=\s*1588764;'
    replace:
      '\1AccessibilityAnnotationSpecifics accessibility_annotation =
      1588764;\1AIChatConversationSpecifics ai_chat_conversation = 10000001;'
