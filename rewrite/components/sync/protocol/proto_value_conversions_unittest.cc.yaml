substitutions:
  - description:
      "Bump the GetNumDataTypes static_assert for Brave's extra data types"
    re_pattern: 'static_assert\(64\s*==\s*syncer::GetNumDataTypes\(\),'
    replace: 'static_assert(65 == syncer::GetNumDataTypes(),'

  - description:
      'Add the specifics-to-value test for the AI Chat conversation type.'
    re_pattern: 'DEFINE_SPECIFICS_TO_VALUE_TEST\(accessibility_annotation\)'
    replace: |-
      DEFINE_SPECIFICS_TO_VALUE_TEST(accessibility_annotation)
      DEFINE_SPECIFICS_TO_VALUE_TEST(ai_chat_conversation)
