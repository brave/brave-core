substitutions:
  - description: |-
      Append kAIChat to the UserSelectableType enum and make it the new
      kLastType. Anchoring on the existing kLastType value keeps our entry last
      and forces a manual review if upstream appends a new type.
    re_pattern: '(\n[ \t]*)kLastType\s*=\s*kCookies'
    replace: '\1kAIChat,\1kLastType = kAIChat'
