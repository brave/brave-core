substitutions:
  - description:
      'Insert Brave DataTypeInfo table entries immediately before the NIGORI
      control entry, keeping them last among the user data types. Anchored on
      the NIGORI entry alone so it does not depend on the brace layout of the
      preceding entry.'
    re_pattern: '(\n([ \t]*))(\{\s*\.type\s*=\s*NIGORI,)'
    replace: '\1BRAVE_DATA_TYPE_INFO_TABLE_ENTRY\1\3'

  - description:
      "Bump the GetNumDataTypes static_assert for Brave's extra data types"
    re_pattern: 'static_assert\(GetNumDataTypes\(\)\s*==\s*64,'
    replace: 'static_assert(GetNumDataTypes() == 65,'

  - description:
      'Add default field values for Brave data types in AddDefaultFieldValue.'
    re_pattern: 'specifics->mutable_theme_android\(\);(\n[ \t]*)break;'
    replace: 'specifics->mutable_theme_android();\1break;\1BRAVE_DATA_TYPE_ADD_DEFAULT_FIELD_VALUE'

  - description:
      'Map Brave data types to histogram values in DataTypeHistogramValue.'
    re_pattern: '(\n[ \t]*)return DataTypeForHistograms::kThemesAndroid;'
    replace:
      '\1return
      DataTypeForHistograms::kThemesAndroid;\1BRAVE_DATA_TYPE_HISTOGRAM_VALUE'
