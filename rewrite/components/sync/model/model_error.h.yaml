substitutions:
  - description: |-
      Append the AI Chat model error value and make it the new kMaxValue. The
      new value and kMaxValue share a line so the upstream java_cpp_enum parser
      still emits kMaxValue.
    re_pattern:
      '(\n[
      \t]*)kMaxValue\s*=\s*kBookmarksLocalCountExceededLimitAfterInitialMerge,'
    replace:
      '\1kAIChatFailedToLoadMetadata = 193, kMaxValue =
      kAIChatFailedToLoadMetadata,'
