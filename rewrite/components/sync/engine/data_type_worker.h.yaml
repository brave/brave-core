# NOTE: The `FORWARD_DECLARE_TEST` declarations for the Brave test fixtures stay
# in the chromium_src wrapper (they must precede this header's inclusion in the
# `syncer` namespace). This plaster makes `OnCommitResponse` virtual and adds the
# friend declarations.
substitutions:
  - description: 'Make OnCommitResponse virtual'
    make_virtual:
      class_name: DataTypeWorker
      method_name: OnCommitResponse

  # The friends land in the order listed, yielding `BraveDataTypeWorker` then
  # `BraveDataTypeWorkerTest`, with the FRIEND_TEST_ALL_PREFIXES anchored on the
  # latter.
  - description: 'Friend BraveDataTypeWorker and its test'
    add_friend:
      class_name: DataTypeWorker
      friend_type:
        - class BraveDataTypeWorker
        - class BraveDataTypeWorkerTest

  - description: 'Friend the BraveDataTypeWorker tests'
    regex:
      re_pattern: '(friend class BraveDataTypeWorkerTest;)'
      replace: |-
        \1
          FRIEND_TEST_ALL_PREFIXES(BraveDataTypeWorkerTest, ResetProgressMarker);
          FRIEND_TEST_ALL_PREFIXES(BraveDataTypeWorkerTest,
                                   ResetProgressMarkerMaxPeriod);
