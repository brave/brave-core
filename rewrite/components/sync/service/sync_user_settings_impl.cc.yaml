substitutions:
  - description:
      'Bump the GetNumDataTypes static_assert for AI_CHAT_CONVERSATION'
    re_pattern: 'static_assert\(64 == GetNumDataTypes\(\),'
    replace: 'static_assert(65 == GetNumDataTypes(),'

  - description: |-
      Call BraveAdjustPreferredDataTypes for unconditional and
      local-sync-only type exclusions.
    re_pattern:
      '(SyncUserSettingsImpl::GetPreferredDataTypes[\s\S]+?)(\s+return
      types;\n})'
    re_flags: ['MULTILINE']
    replace: |-
      \1
        BraveAdjustPreferredDataTypes(&types, prefs_->IsLocalSyncEnabled());\2
