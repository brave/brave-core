substitutions:
  - description: |
      Override Chrome Branding checks with OFFICIAL_BUILD
    count: 0
    regex:
      pattern: BUILDFLAG(GOOGLE_CHROME_BRANDING)
      replace: defined(OFFICIAL_BUILD)
  - description: |
      Override crashpad annotations for iOS
    regex:
      pattern: return process_annotations;
      replace: return GetProcessSimpleAnnotations_BraveImpl(process_annotations);
