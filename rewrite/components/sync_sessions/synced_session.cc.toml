[[substitution]]
description = 'Prefix virtual URL on converting SerializedNavigationEntry to SyncData'
re_pattern = '\? navigation\.virtual_url\(\)\.spec\(\)'
replace = '? navigation.virtual_url_prefix() + navigation.virtual_url().spec()'
