caption: Disable Brave Ads
default: null
desc: |-
  Disable Brave Ads in Brave.

  Brave Ads is a privacy-preserving advertising feature in Brave.

            If this policy is set to true, Brave Ads will always be disabled.

            If this policy is set to false, Brave Ads will always be enabled.

            If you set this policy, users cannot change or override it.

            If this policy is left unset, Brave Ads will be enabled by default.
example_value: true
