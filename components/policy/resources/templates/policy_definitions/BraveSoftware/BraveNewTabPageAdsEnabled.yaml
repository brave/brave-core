caption: Enable Brave new tab page ads
default: null
desc: |-
  Enable or disable Brave new tab page ads.

  If this policy is set to false, Brave new tab page ads are disabled and users cannot enable them.

  If this policy is set to true or left unset, Brave new tab page ads are enabled but users can disable them in settings.
example_value: true
