syntax = "proto3";

option optimize_for = LITE_RUNTIME;

package brave_account.endpoint_client;

// Schemas for Protobuf bodies used by test endpoints.

message ProtobufRequestBody {
  string request = 1;
}

message ProtobufSuccessBody {
  string success = 1;
}

message ProtobufErrorBody {
  string error = 1;
}
