[package]
name = "candle_nemotron_q8_0"
version = "0.1.0"
edition = "2021"
workspace = "../../../../third_party/wasm"

[lib]
crate-type = ["cdylib", "rlib"]

# Native diagnostic binary -- not part of the WASM build. Use the
# Brave-vendored cargo to compile and run:
#   third_party/rust-toolchain/bin/cargo run --release \
#     --manifest-path \
#       components/local_ai/resources/candle_nemotron_q8_0/Cargo.toml \
#     --example transcribe -- MODEL_DIR WAV_PATH
[[example]]
name = "transcribe"
path = "examples/transcribe.rs"

[dependencies]
candle-core = "=0.9.1"
candle-nn = "=0.9.1"
tokenizers = { version = "0.21.0", default-features = false, features = ["unstable_wasm"] }
serde_json = "1.0.99"
serde = { version = "1.0", features = ["derive"] }
safetensors = "0.4"

# WASM-specific dependencies
wasm-bindgen = "=0.2.100" # Must match the wasm-bindgen-cli version under brave/tools/crates!
console_error_panic_hook = "0.1.7"
getrandom = { version = "0.2", features = ["js"] }
