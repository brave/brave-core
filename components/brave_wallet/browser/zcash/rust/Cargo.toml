[package]
name = "zcash"
version = "1.0.0"
edition = "2021"
license = "MPL-2.0"

[dependencies]
brave_wallet = { version = "1" }
cxx = { version = "1" }
orchard = { version = "0.15",  default-features = false, features = ["circuit"] }
rand = "0.8"
zcash_primitives  = { version = "0.29", default-features = false }
zcash_note_encryption = "0.4.1"
zcash_client_backend = { version = "0.24.0-rc.1", default-features = false }
shardtree = { version="0.7.0", features=["legacy-api"] }

[lib]
name = "zcash"
path = "lib.rs"
crate-type = ["rlib"]
