[package]
name = "ai-chat-e2ee"
version = "0.1.0"
authors = ["Darnell Andries <dandries@brave.com>"]
edition = "2024"
license = "MPL-2.0"

[dependencies]
chacha20poly1305 = { version = "0.10", default-features = false, features = ["alloc", "rand_core"] }
curve25519-dalek = { version = "4.1", default-features = false }
cxx = { version = "1" }
hkdf = { version = "0.11", default-features = false }
rand = { version = "0.8", default-features = false, features = ["getrandom"] }
sha2 = { version = "0.9", default-features = false }
x25519-dalek = { version = "2.0", default-features = false, features = ["static_secrets"] }

[dev-dependencies]
ed25519-dalek = { version = "2.1", default-features = false, features = ["rand_core"] }

[lib]
name = "ai_chat_e2ee_cxx"
path = "lib.rs"
crate-type = ["rlib"]
