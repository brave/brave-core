syntax = "proto3";

package ai_chat.store;

option optimize_for = LITE_RUNTIME;

//
// Structured data stored by the client, usually in SQL
//

message ImageContentBlockProto {
  string image_url = 1;
}

message TextContentBlockProto {
  string text = 1;
}

message WebSourcesContentBlockProto {
  repeated WebSourceProto sources = 1;
  repeated string queries = 2;
  repeated string rich_results = 3;
}

message ContentBlockProto {
  oneof content {
    ImageContentBlockProto image_content_block = 1;
    TextContentBlockProto text_content_block = 2;
    WebSourcesContentBlockProto web_sources_content_block = 3;
  }
}

message ToolArtifactProto {
  string type = 1;
  string content_json = 2;
}

message ToolUseEventProto {
  string tool_name = 1;
  string id = 2;

  // We can't use google.protobuf.Struct in Chromium
  // so we use JSON string for something that's easily convertable
  // to DictionaryValue.
  string arguments_json = 3;
  repeated ContentBlockProto output = 4;

  // True if the output was provided by the server (server-side tool execution).
  bool is_server_result = 5;

  repeated ToolArtifactProto artifacts = 6;
}

message WebSourceProto {
  string title = 1;
  string url = 2;
  string favicon_url = 3;
  optional string page_content = 4;
  repeated string extra_snippets = 5;
}

message WebSourcesEventProto {
  repeated WebSourceProto sources = 1;
  repeated string rich_results = 2;
}

message InlineSearchEventProto {
  string query = 1;
  string results_json = 2;
}

message SkillEntryProto {
  string shortcut = 1;
  string prompt = 2;
}
