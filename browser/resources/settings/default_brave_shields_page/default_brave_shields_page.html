<link rel="stylesheet" href="chrome://resources/brave/leo/css/variables.css">
<style include="settings-shared md-select">
  .label.shields-primary-title
  {
    font-size: 1.05em;
    font-weight: 500;
    padding-top: 1em;
  }
  .label.shields-secondary-title {
    padding-bottom: 0;
  }
  .flex-center {
    align-items: center;
    display: flex;
  }
  .shields-view-col {
    border: var(--cr-section_-_border-top);
    border-radius: 6px;
    float: left;
    height: 98px;
    margin: 16px 0 24px;
    padding: 0 24px;
    width: calc(50% - 58px);
  }
  .shields-view-col:last-of-type {
    margin: 16px 0 24px 16px;
  }
  .shields-view-label {
    cursor: pointer;
    margin: 0 20px;
  }
  .block-all-cookies-warn {
    cursor: pointer;
    color: red;
  }
  .shields-options-disabled-container {
    padding-bottom: var(--leo-spacing-xl);
  }
  .shields-options-disabled-container leo-alert {
    padding-top: var(--leo-spacing-m);
  }
  .shields-options-disabled-alert-title {
    font: var(--leo-font-heading-h4);
  }
  .shields-options-disabled-alert-content {
    font: var(--leo-font-default-regular);
  }
  .shields-options-disabled-alert-button {
    padding-top: var(--leo-spacing-xl);
  }
  .md-select:disabled {
    background-color: var(--leo-color-container-disabled) !important;
  }
</style>
<div hidden="[[isAdBlockRoute_]]">
  <div class="settings-box first">
    <div class="flex">
      <div class="label shields-primary-title">$i18n{braveShieldsDefaultsSectionTitle}</div>
      <div class="label secondary shields-secondary-title">
        <p>$i18n{braveShieldsDefaultsSectionDescription1}</p>
        <p>$i18n{braveShieldsDefaultsSectionDescription2}</p>
      </div>
      <div class="shields-options-disabled-container">
        <template is="dom-if" if="[[isAdBlockOnlyModeEnabled_]]">
          <leo-alert type="info" hideIcon="true" has-actions="false">
            <div class="shields-options-disabled-alert-title">Shields options are currently disabled</div>
            <div class="shields-options-disabled-alert-content">Ad block only mode only enables ad blocking rules to prevent
              possible web breakages. If you would like to enable
              standard shields, please disable this mode.</div>
            <leo-button on-click="onTurnOffAdBlockOnlyMode_" class="shields-options-disabled-alert-button">Turn off ad block only
              mode</leo-button>
          </leo-alert>
        </template>
      </div>
    </div>
  </div>
  <settings-toggle-button
      class="cr-row"
      pref="{{prefs.brave.shields.stats_badge_visible}}"
      label="$i18n{showStatsBlockedBadgeLabel}">
  </settings-toggle-button>
  <div class="settings-box">
    <div class="start">$i18n{adControlLabel}</div>
    <select id="adControlType" class="md-select"
        on-change="onAdControlChange_" disabled="[[isAdBlockOnlyModeEnabled_]]">
      <template is="dom-repeat" items="[[adControlTypes_]]">
        <option value="[[item.value]]"
            selected="[[controlEqual_(item.value, adControlType_)]]">
          [[item.name]]
        </option>
      </template>
    </select>
  </div>
  <div hidden="[[!isHttpsByDefaultEnabled_]]" class="settings-box">
    <div class="start">$i18n{httpsUpgradeControlLabel}</div>
    <select id="httpsUpgradeControlType" class="md-select"
        on-change="onHttpsUpgradeControlChange_" disabled="[[isAdBlockOnlyModeEnabled_]]">
      <template is="dom-repeat" items="[[httpsUpgradeControlTypes_]]">
        <option value="[[item.value]]"
            selected="[[controlEqual_(item.value, httpsUpgradeControlType_)]]">
          [[item.name]]
        </option>
      </template>
    </select>
  </div>
  <settings-toggle-button id="noScriptControlType"
      class="cr-row"
      pref="[[noScriptControlType_]]"
      label="$i18n{noScriptControlLabel}"
      on-settings-boolean-control-change="onNoScriptControlChange_"
      disabled="[[isAdBlockOnlyModeEnabled_]]">
  </settings-toggle-button>
  <div hidden="[[!showStrictFingerprintingMode_]]" class="settings-box">
    <div class="start">$i18n{fingerprintingControlLabel}</div>
    <select id="fingerprintingSelectControlType" class="md-select"
        on-change="onFingerprintingSelectControlChange_" disabled="[[isAdBlockOnlyModeEnabled_]]">
      <template is="dom-repeat" items="[[fingerprintingControlTypes_]]">
        <option value="[[item.value]]"
            selected="[[controlEqual_(item.value, fingerprintingControlType_)]]">
          [[item.name]]
        </option>
      </template>
    </select>
  </div>
  <settings-toggle-button id="fingerprintingToggleControlType"
    hidden="[[showStrictFingerprintingMode_]]"
    class="cr-row"
    pref="[[isFingerprintingEnabled_]]"
    label="$i18n{fingerprintingControlLabel}"
    on-settings-boolean-control-change="onFingerprintingToggleControlChange_"
    disabled="[[isAdBlockOnlyModeEnabled_]]">
  </settings-toggle-button>
  <div class="settings-box">
    <div class="start">
      <div class="label">$i18n{cookieControlLabel}</div>
      <div class="cr-secondary-text label block-all-cookies-warn" hidden="[[!controlEqual_('block', cookieControlType_)]]">
        <span>$i18nRaw{blockAllCookiesDeprecatedLabel}</span>
      </div>
    </div>
    <select id="cookieControlType" class="md-select"
        on-change="onCookieControlChange_" disabled="[[isAdBlockOnlyModeEnabled_]]" >
      <template is="dom-repeat" items="[[cookieControlTypes_]]">
        <option value="[[item.value]]"
            selected="[[controlEqual_(item.value, cookieControlType_)]]">
          [[item.name]]
        </option>
      </template>
    </select>
  </div>
  <settings-toggle-button id="forgetFirstPartyStorageControlType"
    hidden="[[!isForgetFirstPartyStorageFeatureEnabled_]]"
    class="cr-row"
    label="$i18n{forgetFirstPartyStorageLabel}"
    sub-label="$i18n{forgetFirstPartyStorageSubLabel}"
    on-settings-boolean-control-change="onForgetFirstPartyStorageToggleChange_"
    pref="[[isForgetFirstPartyStorageEnabled_]]"
    disabled="[[isAdBlockOnlyModeEnabled_]]">
  </settings-toggle-button>
  <template is="dom-if" if="[[isDeAmpFeatureEnabled_]]">
    <settings-toggle-button
      class="cr-row"
      pref="{{prefs.brave.de_amp.enabled}}"
      label="$i18n{deAmpSettingLabel}"
      sub-label="$i18n{deAmpSettingSubLabel}"
      learn-more-url="$i18n{deAmpLearnMoreURL}"
      disabled="[[isAdBlockOnlyModeEnabled_]]">
    </settings-toggle-button>
  </template>
  <template is="dom-if" if="[[isDebounceFeatureEnabled_]]">
    <settings-toggle-button
      class="cr-row"
      pref="{{prefs.brave.debounce.enabled}}"
      label="$i18n{debounceSettingLabel}"
      sub-label="$i18n{debounceSettingSubLabel}"
      learn-more-url="$i18n{debounceLearnMoreURL}"
      disabled="[[isAdBlockOnlyModeEnabled_]]">
    </settings-toggle-button>
  </template>
  <settings-toggle-button
    class="cr-row"
    pref="{{prefs.brave.reduce_language}}"
    label="$i18n{reduceLanguageControlLabel}"
    sub-label="$i18n{reduceLanguageDesc}"
    disabled="[[isAdBlockOnlyModeEnabled_]]">
  </settings-toggle-button>
  <settings-toggle-button id="setContactInfoSaveFlagToggle"
      class="cr-row"
      pref="[[isContactInfoSaveFlagEnabled_]]"
      label="$i18n{braveShieldsSaveContactInfo}"
      sub-label="$i18n{braveShieldsSaveContactInfoSublabel}"
      on-settings-boolean-control-change="onSaveContactInfoToggle_">
  </settings-toggle-button>
</div>
<settings-animated-pages id="filters" section="shields">
  <div route-path="default">
    <cr-link-row
      id="contentFiltersRow"
      class="hr"
      label="$i18n{adblockContentFilteringLabel}"
      sub-label="$i18n{adblockContentFilterLabelDesc}"
      on-click="onAdblockPageClick_"
      disabled="[[isAdBlockOnlyModeEnabled_]]"
    ></cr-link-row>
  </div>
  <template is="dom-if" route-path="/shields/filters" no-search>
    <settings-subpage
      associated-control="[[$$('#contentFiltersRow')]]"
      page-title="$i18n{adblockContentFiltersLabel}"
      disabled="[[isAdBlockOnlyModeEnabled_]]">
      <adblock-subpage prefs="{{prefs}}"></adblock-subpage>
    </settings-subpage>
  </template>
</settings-animated-pages>
