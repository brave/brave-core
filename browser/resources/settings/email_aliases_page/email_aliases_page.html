<settings-subpage page-title="[[pageTitle_]]" class="multi-card">
  <settings-section id="signInSection">
    <div id="signInRoot"></div>
    <settings-toggle-button
        class="cr-row"
        hidden$="[[!showAutofillToggle_]]"
        pref="{{prefs.brave.email_aliases.new_alias_autofill_suggestion_enabled}}"
        label="[[autofillSuggestionLabel_]]"
        sub-label="[[autofillSuggestionSubLabel_]]">
    </settings-toggle-button>
  </settings-section>
  <settings-section id="manageSection">
  </settings-section>
</settings-subpage>
