<settings-subpage
  page-title="$i18n{siteSettingsCardano}">
  <settings-category-default-radio-group
    id="cardanoDefault"
    category="[[contentSettingsTypesEnum_.CARDANO]]"
    ask-option-label="$i18n{siteSettingsCardanoAsk}"
    ask-option-icon="cardano-on"
    block-option-label="$i18n{siteSettingsCardanoBlock}"
    block-option-icon="cardano-off">
  </settings-category-default-radio-group>
  <category-setting-exceptions
    id="cardanoExceptions"
    category="[[contentSettingsTypesEnum_.CARDANO]]"
    allow-header="$i18n{siteSettingsAllow}"
    block-header="$i18n{siteSettingsBlock}"
    read-only-list>
  </category-setting-exceptions>
</settings-subpage>
