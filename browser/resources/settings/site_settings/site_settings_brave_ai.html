<settings-subpage
  associated-control="[[$$('#braveAIChat')]]"
  page-title="$i18n{siteSettingsBraveOpenAIChat}">
  <settings-category-default-radio-group
    id="braveAIChatDefault"
    category="[[contentSettingsTypesEnum_.BRAVE_OPEN_AI_CHAT]]"
    ask-option-label="$i18n{siteSettingsBraveOpenAIChatAsk}"
    ask-option-icon="user"
    block-option-label="$i18n{siteSettingsBraveOpenAIChatBlock}"
    block-option-icon="user-off">
  </settings-category-default-radio-group>
  <category-setting-exceptions
    id="braveAIChatExceptions"
    category="[[contentSettingsTypesEnum_.BRAVE_OPEN_AI_CHAT]]"
    allow-header="$i18n{siteSettingsAllow}"
    block-header="$i18n{siteSettingsBlock}"
    read-only-list>
  </category-setting-exceptions>
</settings-subpage>
