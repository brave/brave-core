<settings-subpage
  page-title="$i18n{siteSettingsEthereum}">
  <settings-category-default-radio-group
    id="ethereumDefault"
    category="[[contentSettingsTypesEnum_.ETHEREUM]]"
    ask-option-label="$i18n{siteSettingsEthereumAsk}"
    ask-option-icon="ethereum-on"
    block-option-label="$i18n{siteSettingsEthereumBlock}"
    block-option-icon="ethereum-off">
  </settings-category-default-radio-group>
  <category-setting-exceptions
    id="ethereumExceptions"
    category="[[contentSettingsTypesEnum_.ETHEREUM]]"
    allow-header="$i18n{siteSettingsAllow}"
    block-header="$i18n{siteSettingsBlock}"
    read-only-list>
  </category-setting-exceptions>
</settings-subpage>
